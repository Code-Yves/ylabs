<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ylabs — Yves</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --pink:   #FF006E;
  --purple: #8338EC;
  --blue:   #3A86FF;
  --orange: #FB5607;
  --yellow: #FFBE0B;
  --teal:   #06D6A0;
  --bg:     #06060d;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Courier New', Courier, monospace;
  color: white;
  cursor: none;
}

/* ───────────────── Custom cursor ───────────────── */
#cursor {
  position: fixed;
  width: 10px; height: 10px;
  background: white;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  mix-blend-mode: difference;
  transition: width .15s, height .15s;
}
#cursor.big { width: 28px; height: 28px; }

/* ───────────────── Aurora blobs ───────────────── */
.aurora {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
  overflow: hidden;
}

/* blob-wrap is moved by JS parallax; blob inside drifts via CSS */
.blob-wrap { position: absolute; }

.blob {
  border-radius: 50%;
  filter: blur(110px);
  will-change: transform, border-radius;
}

.blob-1 .blob {
  width: 680px; height: 680px;
  background: var(--purple); opacity: .38;
  top: -240px; left: -160px;
  animation: drift-a 13s ease-in-out infinite, morph-a 9s ease-in-out infinite;
}
.blob-2 .blob {
  width: 520px; height: 520px;
  background: var(--pink); opacity: .32;
  bottom: -180px; right: -140px;
  animation: drift-b 11s ease-in-out infinite, morph-b 7s ease-in-out infinite;
}
.blob-3 .blob {
  width: 420px; height: 420px;
  background: var(--blue); opacity: .28;
  top: 35%; left: 42%;
  animation: drift-c 16s ease-in-out infinite, morph-a 11s ease-in-out infinite reverse;
}
.blob-4 .blob {
  width: 360px; height: 360px;
  background: var(--orange); opacity: .22;
  top: 10%; right: 12%;
  animation: drift-d 9s ease-in-out infinite, morph-b 13s ease-in-out infinite;
}
.blob-5 .blob {
  width: 280px; height: 280px;
  background: var(--teal); opacity: .25;
  bottom: 20%; left: 18%;
  animation: drift-e 12s ease-in-out infinite, morph-a 8s ease-in-out infinite;
}

@keyframes drift-a {
  0%,100% { transform: translate(0,0); }
  33%      { transform: translate(90px,70px); }
  66%      { transform: translate(-50px,120px); }
}
@keyframes drift-b {
  0%,100% { transform: translate(0,0); }
  33%      { transform: translate(-70px,-90px); }
  66%      { transform: translate(50px,-40px); }
}
@keyframes drift-c {
  0%,100% { transform: translate(-50%,-50%); }
  50%      { transform: translate(-50%,-50%) scale(1.35); }
}
@keyframes drift-d {
  0%,100% { transform: translate(0,0); }
  50%      { transform: translate(-100px,80px) scale(1.15); }
}
@keyframes drift-e {
  0%,100% { transform: translate(0,0); }
  40%      { transform: translate(60px,-60px); }
  80%      { transform: translate(-30px,40px); }
}

@keyframes morph-a {
  0%,100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
  25%      { border-radius: 58% 42% 75% 25% / 76% 46% 54% 24%; }
  50%      { border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%; }
  75%      { border-radius: 33% 67% 58% 42% / 63% 68% 32% 37%; }
}
@keyframes morph-b {
  0%,100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
  33%      { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
  66%      { border-radius: 70% 30% 50% 50% / 30% 70% 40% 60%; }
}

/* ───────────────── Geometric shapes ───────────────── */
.shapes {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 1;
  overflow: hidden;
}
.shape {
  position: absolute;
  opacity: .12;
  filter: drop-shadow(0 0 6px rgba(255,255,255,.3));
}

.sh-hex  { width:170px; height:170px; top:8%;  left:12%;  animation: spin-float 20s linear infinite; }
.sh-tri  { width:110px; height:110px; top:62%; left:6%;   animation: bounce-rot 15s ease-in-out infinite; }
.sh-ring { width:240px; height:240px; bottom:8%; right:8%; animation: spin-float 26s linear infinite reverse; }
.sh-dia  { width:130px; height:130px; top:12%; right:18%; animation: bounce-rot 12s ease-in-out infinite reverse; }
.sh-wave { width:220px; height:90px;  bottom:18%; left:42%; animation: wave-float 18s linear infinite; }
.sh-star { width:100px; height:100px; top:48%; right:5%;   animation: spin-float 14s linear infinite; }
.sh-cross{ width:90px;  height:90px;  top:30%; left:48%;   animation: bounce-rot 10s ease-in-out infinite; }

@keyframes spin-float {
  0%   { transform: rotate(0deg)   translateY(0); }
  50%  { transform: rotate(180deg) translateY(-35px); }
  100% { transform: rotate(360deg) translateY(0); }
}
@keyframes bounce-rot {
  0%,100% { transform: translateY(0)    rotate(0deg); }
  33%      { transform: translateY(-45px) rotate(18deg); }
  66%      { transform: translateY(15px) rotate(-12deg); }
}
@keyframes wave-float {
  0%   { transform: translateX(0)    rotate(0deg); }
  50%  { transform: translateX(-30px) rotate(8deg); }
  100% { transform: translateX(0)    rotate(0deg); }
}

/* ───────────────── Canvas trail ───────────────── */
#trail {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 2;
}

/* ───────────────── Noise grain ───────────────── */
.noise {
  position: fixed; inset: -50%;
  width: 200%; height: 200%;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: .028; pointer-events: none; z-index: 3;
  animation: grain .4s steps(1) infinite;
}
@keyframes grain {
  0%  { transform: translate(0,0); }
  20% { transform: translate(-2%,-1%); }
  40% { transform: translate(1%, 2%); }
  60% { transform: translate(2%,-2%); }
  80% { transform: translate(-1%, 1%); }
}

/* ───────────────── Content ───────────────── */
.content {
  position: relative; z-index: 10;
  width: 100%; height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 52px;
}

/* ───────────────── Header ───────────────── */
.header { text-align: center; }

.header h1 {
  font-size: clamp(3.2rem, 9vw, 7.5rem);
  font-weight: 900;
  letter-spacing: -.04em;
  line-height: 1;
  background: linear-gradient(140deg, #fff 40%, rgba(255,255,255,.3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header .role {
  margin-top: 14px;
  font-size: .78rem;
  letter-spacing: .35em;
  text-transform: uppercase;
  color: rgba(255,255,255,.35);
}

/* ───────────────── Project cards ───────────────── */
.projects {
  display: flex; gap: 14px;
  flex-wrap: wrap; justify-content: center;
  max-width: 860px; padding: 0 20px;
}

.card {
  position: relative;
  padding: 18px 26px;
  border: 1px solid rgba(255,255,255,.09);
  border-radius: 14px;
  background: rgba(255,255,255,.035);
  backdrop-filter: blur(14px);
  cursor: pointer;
  text-decoration: none; color: white;
  transition: transform .3s ease, border-color .3s, background .3s;
  overflow: hidden;
  min-width: 160px;
}

/* Glow layer */
.card::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 14px;
  opacity: 0;
  transition: opacity .35s;
}
.c1::before { background: radial-gradient(circle at 0% 0%, var(--purple) 0%, transparent 65%); }
.c2::before { background: radial-gradient(circle at 0% 0%, var(--pink)   0%, transparent 65%); }
.c3::before { background: radial-gradient(circle at 0% 0%, var(--blue)   0%, transparent 65%); }
.c4::before { background: radial-gradient(circle at 0% 0%, var(--orange) 0%, transparent 65%); }
.c5::before { background: radial-gradient(circle at 0% 0%, var(--yellow) 0%, transparent 65%); }
.c6::before { background: radial-gradient(circle at 0% 0%, var(--teal)   0%, transparent 65%); }

.card:hover { transform: translateY(-5px) scale(1.03); border-color: rgba(255,255,255,.25); background: rgba(255,255,255,.07); }
.card:hover::before { opacity: .22; }

.dot {
  width: 7px; height: 7px;
  border-radius: 50%; margin-bottom: 11px;
}
.c1 .dot { background: var(--purple); box-shadow: 0 0 8px var(--purple); }
.c2 .dot { background: var(--pink);   box-shadow: 0 0 8px var(--pink); }
.c3 .dot { background: var(--blue);   box-shadow: 0 0 8px var(--blue); }
.c4 .dot { background: var(--orange); box-shadow: 0 0 8px var(--orange); }
.c5 .dot { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
.c6 .dot { background: var(--teal);   box-shadow: 0 0 8px var(--teal); }

.card-title {
  font-size: .9rem; font-weight: bold;
  letter-spacing: .04em; margin-bottom: 5px;
}
.card-desc {
  font-size: .72rem;
  color: rgba(255,255,255,.38);
  letter-spacing: .02em;
}

/* ───────────────── Hint ───────────────── */
.hint {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%);
  font-size: .68rem; letter-spacing: .28em;
  text-transform: uppercase;
  color: rgba(255,255,255,.18); z-index: 10;
  animation: pulse 3.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity:.4; } 50% { opacity:1; } }
</style>
</head>
<body>

<div id="cursor"></div>

<!-- Aurora -->
<div class="aurora">
  <div class="blob-wrap blob-1" data-speed="25"><div class="blob"></div></div>
  <div class="blob-wrap blob-2" data-speed="18"><div class="blob"></div></div>
  <div class="blob-wrap blob-3" data-speed="10"><div class="blob"></div></div>
  <div class="blob-wrap blob-4" data-speed="32"><div class="blob"></div></div>
  <div class="blob-wrap blob-5" data-speed="22"><div class="blob"></div></div>
</div>

<!-- Geometric shapes -->
<div class="shapes">
  <!-- Hexagon -->
  <svg class="shape sh-hex" viewBox="0 0 100 100" fill="none">
    <polygon points="50,3 93,26 93,74 50,97 7,74 7,26" stroke="white" stroke-width="1.4"/>
    <polygon points="50,18 78,34 78,66 50,82 22,66 22,34" stroke="white" stroke-width=".5"/>
    <line x1="50" y1="3" x2="50" y2="97" stroke="white" stroke-width=".3" stroke-dasharray="4 4"/>
  </svg>

  <!-- Triangle -->
  <svg class="shape sh-tri" viewBox="0 0 100 100" fill="none">
    <polygon points="50,4 96,90 4,90" stroke="white" stroke-width="1.4"/>
    <polygon points="50,26 76,80 24,80" stroke="white" stroke-width=".5"/>
  </svg>

  <!-- Concentric rings -->
  <svg class="shape sh-ring" viewBox="0 0 100 100" fill="none">
    <circle cx="50" cy="50" r="46" stroke="white" stroke-width="1.4"/>
    <circle cx="50" cy="50" r="34" stroke="white" stroke-width=".5"/>
    <circle cx="50" cy="50" r="20" stroke="white" stroke-width=".5"/>
    <circle cx="50" cy="50" r="7"  stroke="white" stroke-width=".5"/>
    <line x1="4" y1="50" x2="96" y2="50" stroke="white" stroke-width=".3"/>
    <line x1="50" y1="4" x2="50" y2="96" stroke="white" stroke-width=".3"/>
    <line x1="18" y1="18" x2="82" y2="82" stroke="white" stroke-width=".3"/>
    <line x1="82" y1="18" x2="18" y2="82" stroke="white" stroke-width=".3"/>
  </svg>

  <!-- Diamond -->
  <svg class="shape sh-dia" viewBox="0 0 100 100" fill="none">
    <polygon points="50,4 96,50 50,96 4,50" stroke="white" stroke-width="1.4"/>
    <polygon points="50,22 78,50 50,78 22,50" stroke="white" stroke-width=".5"/>
    <line x1="4" y1="50" x2="96" y2="50" stroke="white" stroke-width=".3"/>
  </svg>

  <!-- Wave / squiggle -->
  <svg class="shape sh-wave" viewBox="0 0 220 90" fill="none">
    <path d="M5,45 C32,12 52,78 80,45 C108,12 128,78 156,45 C184,12 204,78 215,45" stroke="white" stroke-width="1.4"/>
    <path d="M5,58 C32,25 52,91 80,58 C108,25 128,91 156,58 C184,25 204,91 215,58" stroke="white" stroke-width=".4"/>
  </svg>

  <!-- Star-ish polygon -->
  <svg class="shape sh-star" viewBox="0 0 100 100" fill="none">
    <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" stroke="white" stroke-width="1.4"/>
  </svg>

  <!-- Cross / plus -->
  <svg class="shape sh-cross" viewBox="0 0 100 100" fill="none">
    <rect x="38" y="8" width="24" height="84" rx="4" stroke="white" stroke-width="1.4"/>
    <rect x="8" y="38" width="84" height="24" rx="4" stroke="white" stroke-width="1.4"/>
    <rect x="44" y="14" width="12" height="72" rx="2" stroke="white" stroke-width=".4"/>
    <rect x="14" y="44" width="72" height="12" rx="2" stroke="white" stroke-width=".4"/>
  </svg>
</div>

<canvas id="trail"></canvas>
<div class="noise"></div>

<!-- ── Main ── -->
<main class="content">
  <header class="header">
    <h1>ylabs</h1>
    <p class="role">Building things &nbsp;·&nbsp; Yves &nbsp;·&nbsp; Blueprint Builds</p>
  </header>

  <div class="projects">
    <a href="https://supplementscore.org/" class="card c1" target="_blank" rel="noopener">
      <div class="dot"></div>
      <div class="card-title">Supplement Score</div>
      <div class="card-desc">Rate &amp; track your supplements</div>
    </a>
    <a href="/news" class="card c2">
      <div class="dot"></div>
      <div class="card-title">Digest</div>
      <div class="card-desc">Your personalized content feed</div>
    </a>
    <a href="/games" class="card c3">
      <div class="dot"></div>
      <div class="card-title">Clear Play</div>
      <div class="card-desc">Games designed for low-vision players</div>
    </a>
  </div>
</main>

<p class="hint">move cursor · hover cards</p>

<script>
// ── Cursor ──────────────────────────────────────────────
const cursor = document.getElementById('cursor');
let mx = 0, my = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';
});

document.querySelectorAll('.card').forEach(c => {
  c.addEventListener('mouseenter', () => cursor.classList.add('big'));
  c.addEventListener('mouseleave', () => cursor.classList.remove('big'));
});

// ── Blob parallax ────────────────────────────────────────
const blobWraps = document.querySelectorAll('.blob-wrap');
document.addEventListener('mousemove', e => {
  const cx = (e.clientX / window.innerWidth  - .5);
  const cy = (e.clientY / window.innerHeight - .5);
  blobWraps.forEach(w => {
    const s = parseFloat(w.dataset.speed || 20);
    w.style.transform = `translate(${cx * s}px, ${cy * s}px)`;
  });
});

// ── Cursor trail canvas ──────────────────────────────────
const canvas = document.getElementById('trail');
const ctx    = canvas.getContext('2d');

const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
resize();
window.addEventListener('resize', resize);

const COLORS = ['#FF006E','#8338EC','#3A86FF','#FB5607','#FFBE0B','#06D6A0'];
let particles = [];

document.addEventListener('mousemove', e => {
  for (let i = 0; i < 4; i++) {
    particles.push({
      x:     e.clientX + (Math.random() - .5) * 14,
      y:     e.clientY + (Math.random() - .5) * 14,
      r:     Math.random() * 4.5 + 1.5,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      alpha: .9,
      vx:    (Math.random() - .5) * 2,
      vy:    (Math.random() - .5) * 2 - .8,
      decay: Math.random() * .025 + .018,
    });
  }
});

(function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.alpha > 0);
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    const hex = Math.max(0, Math.floor(p.alpha * 255)).toString(16).padStart(2, '0');
    ctx.fillStyle = p.color + hex;
    ctx.fill();
    p.x += p.vx;
    p.y += p.vy;
    p.r     *= .96;
    p.alpha -= p.decay;
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
