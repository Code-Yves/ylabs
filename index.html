<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ylabs — Yves</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --pink:   #FF006E;
  --purple: #8338EC;
  --blue:   #3A86FF;
  --orange: #FB5607;
  --yellow: #FFBE0B;
  --teal:   #06D6A0;
  --bg:     #010108;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Courier New', Courier, monospace;
  color: white;
}


/* ───────────────── Aurora blobs ───────────────── */
.aurora {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
  overflow: hidden;
}

/* blob-wrap is moved by JS parallax; blob inside drifts via CSS */
.blob-wrap { position: absolute; }

.blob {
  border-radius: 50%;
  filter: blur(110px);
  will-change: transform, border-radius;
}

.blob-1 .blob {
  width: 680px; height: 680px;
  background: var(--purple); opacity: .07;
  top: -240px; left: -160px;
  animation: drift-a 40s ease-in-out infinite, morph-a 32s ease-in-out infinite;
}
.blob-2 .blob {
  width: 520px; height: 520px;
  background: var(--pink); opacity: .06;
  bottom: -180px; right: -140px;
  animation: drift-b 38s ease-in-out infinite, morph-b 30s ease-in-out infinite;
}
.blob-3 .blob {
  width: 420px; height: 420px;
  background: var(--blue); opacity: .05;
  top: 35%; left: 42%;
  animation: drift-c 50s ease-in-out infinite, morph-a 40s ease-in-out infinite reverse;
}
.blob-4 .blob {
  width: 360px; height: 360px;
  background: var(--orange); opacity: .04;
  top: 10%; right: 12%;
  animation: drift-d 35s ease-in-out infinite, morph-b 45s ease-in-out infinite;
}
.blob-5 .blob {
  width: 280px; height: 280px;
  background: var(--teal); opacity: .05;
  bottom: 20%; left: 18%;
  animation: drift-e 44s ease-in-out infinite, morph-a 34s ease-in-out infinite;
}

@keyframes drift-a {
  0%,100% { transform: translate(0,0); }
  33%      { transform: translate(90px,70px); }
  66%      { transform: translate(-50px,120px); }
}
@keyframes drift-b {
  0%,100% { transform: translate(0,0); }
  33%      { transform: translate(-70px,-90px); }
  66%      { transform: translate(50px,-40px); }
}
@keyframes drift-c {
  0%,100% { transform: translate(-50%,-50%); }
  50%      { transform: translate(-50%,-50%) scale(1.35); }
}
@keyframes drift-d {
  0%,100% { transform: translate(0,0); }
  50%      { transform: translate(-100px,80px) scale(1.15); }
}
@keyframes drift-e {
  0%,100% { transform: translate(0,0); }
  40%      { transform: translate(60px,-60px); }
  80%      { transform: translate(-30px,40px); }
}

@keyframes morph-a {
  0%,100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
  25%      { border-radius: 58% 42% 75% 25% / 76% 46% 54% 24%; }
  50%      { border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%; }
  75%      { border-radius: 33% 67% 58% 42% / 63% 68% 32% 37%; }
}
@keyframes morph-b {
  0%,100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
  33%      { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
  66%      { border-radius: 70% 30% 50% 50% / 30% 70% 40% 60%; }
}

/* ───────────────── Background Y mark ───────────────── */
.bg-y-wrap {
  position: fixed;
  top: 60%; left: 65%;
  transform: translate(-50%, -50%);
  width: 150vmin; height: 150vmin;
  pointer-events: none; z-index: 1;
  animation: bg-spin 60s linear infinite;
}

.bg-y-wrap svg {
  width: 100%; height: 100%;
  opacity: .025;
  animation: flicker 5s steps(1) infinite;
  filter: url(#static);
}

@keyframes bg-spin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to   { transform: translate(-50%, -50%) rotate(360deg); }
}

@keyframes flicker {
  0%   { opacity: .025; filter: url(#static); }
  22%  { opacity: .025; filter: url(#static); }
  22.5%{ opacity: .016; filter: url(#static2); }
  23%  { opacity: .025; filter: url(#static); }
  55%  { opacity: .025; filter: url(#static); }
  55.4%{ opacity: .018; filter: url(#static2); }
  55.8%{ opacity: .025; filter: url(#static); }
  56.2%{ opacity: .014; filter: url(#static2); }
  56.6%{ opacity: .025; filter: url(#static); }
  84%  { opacity: .025; filter: url(#static); }
  84.4%{ opacity: .017; filter: url(#static2); }
  84.8%{ opacity: .025; filter: url(#static); }
  100% { opacity: .025; filter: url(#static); }
}

/* ───────────────── ylabs flicker ───────────────── */
@keyframes title-flicker {
  0%,100% { opacity: .92; }
  41%     { opacity: .92; }
  41.6%   { opacity: .84; }
  42.2%   { opacity: .92; }
  72%     { opacity: .92; }
  72.4%   { opacity: .82; }
  72.9%   { opacity: .92; }
  73.3%   { opacity: .88; }
  73.7%   { opacity: .92; }
}

/* ───────────────── Noise grain ───────────────── */
.noise {
  position: fixed; inset: -50%;
  width: 200%; height: 200%;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: .018; pointer-events: none; z-index: 3;
  animation: grain .6s steps(1) infinite;
}
@keyframes grain {
  0%  { transform: translate(0,0); }
  20% { transform: translate(-2%,-1%); }
  40% { transform: translate(1%, 2%); }
  60% { transform: translate(2%,-2%); }
  80% { transform: translate(-1%, 1%); }
}

/* ───────────────── Content ───────────────── */
.content {
  position: relative; z-index: 10;
  width: 100%; height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding-top: 4vh;
  gap: 44px;
}

/* ───────────────── Header ───────────────── */
.header { text-align: center; display: flex; flex-direction: column; align-items: center; }

.header .logo-tile {
  width: clamp(96px, 10.4vw, 136px);
  height: auto;
  animation: title-flicker 11s steps(1) infinite;
  opacity: .92;
}

.header .logo-tile .y-pupil {
  transition: transform .35s cubic-bezier(.2,.8,.2,1);
}

.header h1 {
  /* keep for a11y but visually hidden — tile IS the wordmark now */
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  border: 0;
}

.header .role {
  margin-top: 14px;
  font-size: .78rem;
  letter-spacing: .35em;
  text-transform: uppercase;
  color: rgba(255,255,255,.35);
}

/* ───────────────── Project cards ───────────────── */
.projects {
  display: flex; gap: 12px;
  flex-wrap: wrap; justify-content: center;
  max-width: 700px; padding: 0 20px;
  margin-top: 22vh;
}

.card {
  position: relative;
  padding: 20px 22px 18px;
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 10px;
  background: rgba(255,255,255,.03);
  backdrop-filter: blur(14px);
  cursor: pointer;
  text-decoration: none; color: white;
  transition: border-color .3s, background .3s;
  overflow: hidden;
  width: 200px;
  min-height: 90px;
  height: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 10px;
}

.card:hover { border-color: rgba(255,255,255,.2); background: rgba(255,255,255,.055); }

.card-icon {
  width: 42px;
  height: 42px;
  display: block;
  opacity: .7;
  transition: opacity .35s;
  flex-shrink: 0;
}
.card:hover .card-icon { opacity: 1; }

.card-title {
  font-size: .82rem; font-weight: 400;
  letter-spacing: .06em;
  text-transform: uppercase;
}
.card-desc {
  font-size: .66rem;
  color: rgba(255,255,255,.32);
  letter-spacing: .02em;
  line-height: 1.45;
}

/* ───────────────── Hint ───────────────── */
.hint {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%);
  font-size: .52rem; letter-spacing: .32em;
  text-transform: uppercase;
  color: rgba(255,255,255,.11); z-index: 10;
  animation: pulse 5s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity:.45; } 50% { opacity:.75; } }

/* ───────────────── Footer logo ───────────────── */
.footer-logo {
  position: fixed;
  bottom: 64px;
  left: 50%;
  transform: translateX(-50%);
  width: 32px;
  opacity: .12;
  z-index: 10;
  pointer-events: none;
}

/* ───────────────── Layout switch ───────────────── */
.layout-switch {
  position: fixed;
  bottom: 18px;
  right: 18px;
  z-index: 20;
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', Courier, monospace;
  font-size: 9px;
  line-height: 1;
  color: rgba(255,255,255,.3);
  text-decoration: none;
  border: 1px solid rgba(255,255,255,.14);
  border-radius: 2px;
  background: rgba(255,255,255,.02);
  transition: color .3s, border-color .3s, background .3s;
}
.layout-switch:hover {
  color: rgba(255,255,255,.85);
  border-color: rgba(255,255,255,.35);
  background: rgba(255,255,255,.06);
}

/* ───────────────── Swing silhouette ───────────────── */
.swing-wrap {
  position: fixed;
  bottom: 0;
  left: calc(50% - 110px);
  z-index: 4;
  pointer-events: none;
  width: 220px;
}

.swing-svg {
  width: 220px;
  opacity: .18;
  filter: blur(1.5px);
  transform-origin: top center;
  animation: swing 6s ease-in-out infinite;
}

@keyframes swing {
  0%   { transform: rotate(-14deg); }
  50%  { transform: rotate(14deg); }
  100% { transform: rotate(-14deg); }
}
</style>
</head>

<!-- Aurora -->
<div class="aurora">
  <div class="blob-wrap blob-1" data-speed="25"><div class="blob"></div></div>

<script>

// ── Blob parallax ────────────────────────────────────────
const blobWraps = document.querySelectorAll('.blob-wrap');
const logoTile  = document.querySelector('.header .logo-tile');
const pupil     = logoTile?.querySelector('.y-pupil');

document.addEventListener('mousemove', e => {
  const cx = (e.clientX / window.innerWidth  - .5);
  const cy = (e.clientY / window.innerHeight - .5);
  blobWraps.forEach(w => {
    const s = parseFloat(w.dataset.speed || 20);
    w.style.transform = `translate(${cx * s}px, ${cy * s}px)`;
  });

  // ── Logo: Y inside the circle "looks" at the cursor — only when nearby ──
  if (!logoTile || !pupil) return;
  const r = logoTile.getBoundingClientRect();
  const lcx = r.left + r.width  / 2;
  const lcy = r.top  + r.height / 2;
  const dx = e.clientX - lcx;
  const dy = e.clientY - lcy;
  const dist = Math.hypot(dx, dy);

  const proximity = 160;                  // only react when cursor is within this many px
  if (dist > proximity || dist === 0) {
    pupil.setAttribute('transform', 'translate(0 0)');
    return;
  }
  // closer = stronger, fades smoothly to 0 at the proximity edge
  const factor   = 1 - (dist / proximity);
  const maxShift = 2;                     // SVG user units — subtle
  const sx = (dx / dist) * maxShift * factor;
  const sy = (dy / dist) * maxShift * factor;
  pupil.setAttribute('transform', `translate(${sx.toFixed(2)} ${sy.toFixed(2)})`);
});

</script>
