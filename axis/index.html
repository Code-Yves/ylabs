function renderAnnotations() {
  const layer = document.getElementById('annotations');
  if (!layer) return;
  layer.innerHTML = '';
  if (!blueprintMode) return;
  const page = blueprintPages[blueprintPageIdx];
  if (!page || !page.annotations) return;
  const w = W(), h = H();
  const v = new THREE.Vector3();
  page.annotations.forEach(ann => {
    v.set(ann.pos[0], 0, ann.pos[1]);
    v.project(orthoCam);
    const sx = (v.x + 1) * 0.5 * w;
    const sy = (1 - v.y) * 0.5 * h;
    const el = document.createElement('div');
    el.className = 'annotation ' + (ann.cls || '');
    el.style.left = sx + 'px';
    el.style.top  = sy + 'px';
    el.innerHTML = ann.text;
    layer.appendChild(el);
  });
}

function applyBlueprintPage(idx) {
  blueprintPageIdx = ((idx % blueprintPages.length) + blueprintPages.length) % blueprintPages.length;
  const page = blueprintPages[blueprintPageIdx];
  blueprintFloorFilter = page.floor || null;   // per-sheet floor filter
  Object.keys(COMP).forEach(k => setVisibility(k, page.layers.includes(k)));
  // Update active highlight in the sheet list
  document.querySelectorAll('.bp-sheet').forEach((el, i) => {
    el.classList.toggle('bp-sheet-active', i === blueprintPageIdx);
  });
  renderAnnotations();
}

// Build the sheet list once (chips-style, matches the component legend layout)
function buildBlueprintSheetList() {
  const container = document.getElementById('blueprint-sheets');
  if (!container) return;
  container.innerHTML = '';
  blueprintPages.forEach((page, i) => {
    const el = document.createElement('div');
    el.className = 'bp-sheet';
    const num  = page.name.split('·')[0].trim();    // "S1"
    const rest = page.name.split('·').slice(1).join('·').trim();
    el.innerHTML =
      `<span class="bp-sheet-num">${num}</span>` +
      `<div class="bp-sheet-body">` +
        `<div class="bp-sheet-title">${rest}</div>` +
        `<div class="bp-sheet-desc">${page.desc}</div>` +
      `</div>`;
    el.addEventListener('click', () => applyBlueprintPage(i));
    container.appendChild(el);
  });
}
buildBlueprintSheetList();

function toggleBlueprint() {
  blueprintMode = !blueprintMode;
  const bpBtn = document.getElementById('blueprint-btn');
  const tdBtn = document.getElementById('mode-btn-3d');
  if (bpBtn) bpBtn.classList.toggle('bar-btn-active',  blueprintMode);
  if (tdBtn) tdBtn.classList.toggle('bar-btn-active', !blueprintMode);
  if (blueprintMode) {
    // Rebuild the sheet list with the current configuration (stacked adds upper pages)
    blueprintPages = buildBlueprintPages();
    buildBlueprintSheetList();
    activeCam = orthoCam;
    orbit.enabled = false;
    orthoOrbit.enabled = true;
    document.body.classList.add('blueprint');
    // Hide site/reference layers so the sheet reads as a pure drawing
    gridMinor.visible = false;
    gridMajor.visible = false;
    gnd.visible = false;
    driveway.visible = false;
    dimGroup.visible = false;
    renderer.setClearColor(BP_BG);
    scene.fog = null;
    // Flatten all solid materials to cream; darken edge lines
    scene.traverse(obj => {
      if (obj.isMesh && obj.material && !obj.material.isLineBasicMaterial) {
        if (!obj.userData._bpStash) obj.userData._bpStash = obj.material;
        obj.material = new THREE.MeshBasicMaterial({
          color: BP_FILL,
          transparent: obj.material.transparent,
          opacity: obj.material.transparent ? 0.35 : 1.0,
          side: obj.material.side || THREE.FrontSide
        });
      }
      if (obj.isLineSegments) {
        if (!obj.userData._bpEdgeStash) {
          obj.userData._bpEdgeStash = { hex: obj.material.color.getHex(), op: obj.material.opacity };
        }
        obj.material.color.setHex(BP_EDGE);
        obj.material.opacity = 0.95;
      }
    });
    // Save current visibility, start at page 0
    savedVisibility = { ...visibility };
    applyBlueprintPage(0);
  } else {
    activeCam = camera;
    orbit.enabled = true;
    orthoOrbit.enabled = false;
    orthoCam.zoom = 1;  // reset for next entry
    orthoCam.updateProjectionMatrix();
    document.body.classList.remove('blueprint');
    renderer.setClearColor(BP_SKY);
    scene.fog = new THREE.FogExp2(BP_SKY, 0.0025);
    // Restore site/reference layers
    gridMinor.visible = true;
    gridMajor.visible = true;
    gnd.visible = true;
    driveway.visible = true;
    dimGroup.visible = true;
    scene.traverse(obj => {
      if (obj.isMesh && obj.userData._bpStash) {
        obj.material = obj.userData._bpStash;
        delete obj.userData._bpStash;
      }
      if (obj.isLineSegments && obj.userData._bpEdgeStash) {
        obj.material.color.setHex(obj.userData._bpEdgeStash.hex);
        obj.material.opacity = obj.userData._bpEdgeStash.op;
        delete obj.userData._bpEdgeStash;
      }
    });
    // Restore visibility and clear the blueprint floor filter
    blueprintFloorFilter = null;
    if (savedVisibility) {
      Object.keys(COMP).forEach(k => setVisibility(k, savedVisibility[k]));
      savedVisibility = null;
    }
    renderAnnotations();  // clears overlay
  }
}

const ray = new THREE.Raycaster();

function pick(key) {
  // De-highlight previous
  if (activeKey) {
    selectables.forEach(m => { if (m.userData.key===activeKey && m.material.emissive) m.material.emissive.setHex(0); });
    document.querySelectorAll('.li.active').forEach(e => e.classList.remove('active'));
  }
  activeKey = key;

  // Highlight new
  selectables.forEach(m => {
    if (m.userData.key===key && m.material.emissive) m.material.emissive.setHex(0x1a3d6e);
  });

  // Update legend
  document.querySelectorAll(`.li[data-k="${key}"]`).forEach(e => {
    e.classList.add('active');
    e.scrollIntoView({ behavior:'smooth', block:'nearest' });
  });

  // Update info panel
  const c = COMP[key];
  document.getElementById('info-name').textContent = c.label;
  document.getElementById('info-facts').innerHTML = c.facts.map(f=>`<div class="fact">${f}</div>`).join('');
  // Populate drawing carousel (if this component has drawings)
  setInfoDrawings(c.drawings);
  // Toggle the "OPEN FULL SHEET ↗" button based on whether an IFC sheet exists
  if (typeof refreshBlueprintButtons === 'function') refreshBlueprintButtons();
  document.getElementById('info').classList.remove('hidden');
}

let currentDrawings = null;
let currentDrawingIdx = 0;
function setInfoDrawings(drawings) {
  const box  = document.getElementById('info-drawing');
  const navs = box.querySelectorAll('.drawing-nav');
  if (!drawings || drawings.length === 0) {
    box.classList.add('hidden');
    currentDrawings = null;

  box.classList.remove('hidden');
  currentDrawings = drawings;
  currentDrawingIdx = 0;
  navs.forEach(b => b.style.visibility = drawings.length > 1 ? 'visible' : 'hidden');
  renderCurrentDrawing();
}
function renderCurrentDrawing() {
  if (!currentDrawings) return;
  const d = currentDrawings[currentDrawingIdx];
  document.getElementById('drawing-title').textContent = d.title;
  document.getElementById('drawing-counter').textContent =
    `${currentDrawingIdx + 1} / ${currentDrawings.length}`;
  document.getElementById('drawing-svg-container').innerHTML = d.svg;
}
function drawingPrev() {
  if (!currentDrawings) return;
  currentDrawingIdx = (currentDrawingIdx - 1 + currentDrawings.length) % currentDrawings.length;
  renderCurrentDrawing();
}
function drawingNext() {
  if (!currentDrawings) return;
  currentDrawingIdx = (currentDrawingIdx + 1) % currentDrawings.length;
  renderCurrentDrawing();
}

// Build a clean standalone SVG string (for download or print)
function currentDrawingSVGString(){
  if (!currentDrawings) return '';
  const raw = currentDrawings[currentDrawingIdx].svg.trim();
  // Ensure xmlns is present (it already is from dwg())
  if (/<svg[^>]*xmlns=/.test(raw)) return raw;
  return raw.replace(/<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
}

// ── Download as SVG ──
function downloadDrawingSVG(){
  if (!currentDrawings) return;
  const d = currentDrawings[currentDrawingIdx];
  const svgText = '<?xml version="1.0" encoding="UTF-8"?>\n' + currentDrawingSVGString();
  const blob = new Blob([svgText], { type:'image/svg+xml;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = (d.title.replace(/[^A-Za-z0-9]+/g,'_')) + '.svg';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

// ── Download as PDF — uses CSS @media print on the host window to print just the sheet ──
// This works reliably on file:// URLs where popups/iframes are often blocked.
function downloadDrawingPDF(){
  if (!currentDrawings) return;
  document.body.classList.add('dwg-printing');
  const afterPrint = () => {
    document.body.classList.remove('dwg-printing');
    window.removeEventListener('afterprint', afterPrint);
  };
  window.addEventListener('afterprint', afterPrint);
  // Small delay so the print CSS applies before the dialog opens
  setTimeout(()=>{ window.print(); }, 80);
  // Fallback cleanup in case 'afterprint' never fires (e.g. user cancels silently on some browsers)
  setTimeout(()=>{ document.body.classList.remove('dwg-printing'); }, 30000);
}

canvas.addEventListener('mousedown', () => { mouseMoved = false; });

canvas.addEventListener('click', e => {
  if (mouseMoved) return;
  mp.set((e.clientX/W())*2-1, -(e.clientY/H())*2+1);
  ray.setFromCamera(mp, camera);
  const hits = ray.intersectObjects(selectables, false);
  if (hits.length) pick(hits[0].object.userData.key);
});

//  VIEW PRESETS
// ═══════════════════════════════════════════════════════════════════════════════
function setView(v) {
  const t = orbit.target.clone();
  const dur = 800, start = performance.now();
  const from = camera.position.clone();
  const targets = {
    iso:   new THREE.Vector3(30, 22, 44),
    front: new THREE.Vector3(0, 6, 60),
    side:  new THREE.Vector3(55, 8, 0),
    top:   new THREE.Vector3(0, 55, 0.01),
  };
  const to = targets[v];
  if (!to) return;
  function step(now) {
    const p = Math.min((now-start)/dur, 1);
    const e = 1 - Math.pow(1-p, 3); // ease-out cubic
    camera.position.lerpVectors(from, to, e);
    orbit.update();
    if (p < 1) requestAnimationFrame(step);
  }

// ═══════════════════════════════════════════════════════════════════════════════
//  ASSEMBLY-SEQUENCE INTRO — layer-by-layer construction reveal on page load
//  Hides every component, then stages them in real build order with a narrator
//  badge. User can dismiss via the Skip button or the Escape key.
// ═══════════════════════════════════════════════════════════════════════════════
const ASSEMBLY_SEQUENCE = [
  { keys:['pier'],                label:'Helical Pier Foundation' },
  { keys:['steel'],               label:'Steel Chassis + Columns' },
  { keys:['joists'],              label:'I-Joist Floor Framing' },
  { keys:['floor'],               label:'Subfloor Deck' },
  { keys:['rim'],                 label:'Rim Board Belt Trim' },
  { keys:['sip'],                 label:'SIP Wall Panels' },
  { keys:['window','door'],       label:'Windows + Entry Door' },
  { keys:['roof'],                label:'Roof Deck + TPO Membrane' },
  { keys:['parapet'],             label:'Parapet + Coping' },
  { keys:['skirt'],               label:'Perimeter Skirting' },
  { keys:['interior'],            label:'Interior Partitions' },
  { keys:['furnishings'],         label:'Fixtures + Furnishings' },
  { keys:['stair'],               label:'Stairs' },
  { keys:['compressor'],          label:'Mini-Split Compressor' },
  { keys:['hrv','ducts'],         label:'HRV + Duct Distribution' },
  { keys:['panel','wiring'],      label:'Electrical Panel + Rough-In' },
  { keys:['supply','waste'],      label:'Water Supply + DWV' },
  { keys:['well','septic'],       label:'Well + Septic Site Services' },
];
const ASSEMBLY_STEP_MS  = 280;    // time between layer reveals
const ASSEMBLY_FIRST_MS = 450;    // initial pause so empty site reads first

let __assemblyTimer  = null;
let __assemblyActive = false;

function assemblyFinish() {
  __assemblyActive = false;
  if (__assemblyTimer) { clearTimeout(__assemblyTimer); __assemblyTimer = null; }
  Object.keys(COMP).forEach(k => setVisibility(k, true));
  const narr = document.getElementById('assembly-narrator');
  const skip = document.getElementById('assembly-skip');
  if (narr) narr.classList.remove('visible');
  if (skip) skip.style.display = 'none';
  document.removeEventListener('keydown', __assemblyKeyHandler);
}

function __assemblyKeyHandler(e) {
  if (!__assemblyActive) return;
  if (e.key === 'Escape' || e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    assemblyFinish();
  }
}

(function runAssemblySequence() {
  // Hide EVERY tagged key (not just COMP entries) — covers 'rim' too
  const allKeys = new Set(Object.keys(COMP));
  scene.traverse(o => { if (o.userData && o.userData.key) allKeys.add(o.userData.key); });
  allKeys.forEach(k => {
    // Use setVisibility if registered; otherwise toggle meshes directly
    if (COMP[k]) setVisibility(k, false);
    else scene.traverse(o => { if (o.userData && o.userData.key === k) o.visible = false; });
  });

  const narr    = document.getElementById('assembly-narrator');
  const stepEl  = document.getElementById('narr-step');
  const textEl  = document.getElementById('narr-text');
  const skip    = document.getElementById('assembly-skip');
  if (!narr || !stepEl || !textEl) { assemblyFinish(); return; }

  const total = ASSEMBLY_SEQUENCE.length;
  let   i     = 0;
  __assemblyActive = true;
  document.addEventListener('keydown', __assemblyKeyHandler);

  // Reveal the narrator + skip after the initial pause
  __assemblyTimer = setTimeout(() => {
    narr.classList.add('visible');
    if (skip) skip.style.display = 'block';
    stepEl.textContent = `00 / ${String(total).padStart(2,'0')}`;
    textEl.textContent = 'Preparing site…';
    __assemblyTimer = setTimeout(tick, ASSEMBLY_STEP_MS);
  }, ASSEMBLY_FIRST_MS);

  function tick() {
    if (!__assemblyActive) return;
    if (i >= total) {
      // Hold the "complete" label briefly, then hide chrome
      stepEl.textContent = `${String(total).padStart(2,'0')} / ${String(total).padStart(2,'0')}`;
      textEl.textContent = 'Assembly complete';
      __assemblyTimer = setTimeout(assemblyFinish, 700);
      return;
    }
    const stage = ASSEMBLY_SEQUENCE[i];
    stage.keys.forEach(k => {
      // Reveal whether or not the key is a COMP entry
      if (COMP[k]) setVisibility(k, true);
      else scene.traverse(o => { if (o.userData && o.userData.key === k) o.visible = true; });
    });
    stepEl.textContent = `${String(i+1).padStart(2,'0')} / ${String(total).padStart(2,'0')}`;
    textEl.textContent = stage.label;
    i++;
    __assemblyTimer = setTimeout(tick, ASSEMBLY_STEP_MS);
  }
})();

(function loop() {
  requestAnimationFrame(loop);
  orbit.update();
  orthoOrbit.update();
  if (blueprintMode) renderAnnotations();    // follow zoom/pan
  renderer.render(scene, activeCam);
})();
</script>

    <summary>S-102: Pier layout — 8 helical piers in 4 × 2 grid; 3200 o.c. long-axis, 1830 o.c. short-axis · Expand for full spec</summary>

      <li>Pier count: 8 total, arranged in 4 columns (A–D) × 2 rows (1–2) beneath the 12800 × 3658 mm modular footprint.</li>
      <li>Spacing: 3200 mm o.c. long-axis (3 interior bays at 3200 + 400 mm end overhang west / 2800 mm overhang east to module ends); 1830 mm o.c. short-axis with 914 mm symmetric edge offset.</li>
      <li>Helical pier: 168 mm OD shaft, single helix plate per <code class="ref">CCMC 13193-R</code> evaluation; allowable axial capacity &#8805; 30 kN each (pier-level design to be verified by engineer of record).</li>
      <li>Embedment: 2400 mm minimum to frost line (<code class="ref">OBC 9.8.3</code>); Ontario frost depth 1200–1500 mm typical — site-confirm per <code class="ref">OBC 9.12.2.2</code> Table.</li>
      <li>Chassis: HSS 150 × 100 × 6.4 long-axis beams along both pier rows (see S-301); HSS 100 × 100 × 6.4 cross beams at each bay division (1/4-points and ends).</li>
      <li>Installation: torque-tested to minimum 2 500 ft-lb at final seat; Kt (torque-to-capacity) factor per <code class="ref">CCMC 13193-R</code> listed pile evaluation — confirm active listing and site geotechnical report.</li>
      <li>Service penetration zone: centered between bays B and C (row midline) — accommodates HDPE water supply, ABS waste/vent stack, and electrical conduit rise.</li>
      <li>Steel grade: <code class="ref">CSA G40.21 350W</code>; hot-dip galvanized per <code class="ref">CSA G164</code>; welding qualifications to <code class="ref">CSA W47.1</code> / <code class="ref">CSA W59</code>.</li>

      <li>Roof assembly: 10.25" (260 mm) roof SIP panel, R-40 effective; continuous 305 mm wood-framed parapet rim on all four sides; see A-305 for parapet section, A-304 for field section.</li>
      <li>Membrane: 1.5 mm fully-adhered TPO, white reflective surface (min. solar reflectance R-3 equivalent); heat-welded seams; bonding adhesive per manufacturer's written instructions; galvanized coping cap over parapet.</li>
      <li>Drainage: central ridge high-point at module C.L.; ¼ in/ft (2%) min slope both directions per OBC 9.26.14; two primary scuppers (100 × 75 mm) on long walls plus two secondary overflow scuppers 50 mm above primary invert.</li>

      <li>Skylight: 610 × 1220 mm (2'×4') curb-mounted unit on 150 mm site-built insulated curb with self-adhered air barrier counterflashing; glazing per CSA A440.2; centred over living/kitchen on the drainage ridge.</li>
      <li>Vents: 75 mm ABS plumbing vent stack above bath core; 150 mm HRV exhaust and 150 mm HRV intake separated ≥3000 mm horizontally per OBC 9.32.3.9; 150 mm range-hood exhaust over kitchen. All penetrations pre-manufactured TPO boots, heat-welded, with self-adhered air barrier flashing at the deck transition.</li>
      <li>Mechanical: mini-split condenser pad 900 × 400 mm on 50 mm EPDM isolation layer, NE corner; line-set penetration through parapet with pitch pan; see M-601.</li>
      <li>Lightning protection: Class I air terminals at each of the four parapet corners (optional per owner's election); bonded to building ground per CSA B72 where provided.</li>

      <li><code class="ref">OBC 9.26.6</code> — Flashing at parapet, penetrations, scuppers, and terminations.</li>

      <li><code class="ref">OBC 9.32.3.9</code> — HRV intake and exhaust separation (≥3000 mm horizontal; intake located to avoid contaminant sources).</li>

    <ul>
      <li>Wall SIP extends up past roof line to form parapet; min. 600 mm above finished roof membrane.</li>
      <li>Inside-corner cant strip (45&#176; PT wood) eliminates 90&#176; bend of membrane at roof-to-parapet junction.</li>
      <li>Roofing membrane continuous: horizontal run &#8594; cant &#8594; up parapet inside face &#8594; over top &#8594; down exterior behind metal coping.</li>
      <li>Parapet top blocking: 2-ply PT softwood, sloped 2% toward interior to shed water onto roof.</li>
      <li>Metal coping: HDG steel, hemmed drip on both edges, spliced joints with backup splice plates and butyl tape.</li>
      <li>Concealed fasteners only: continuous HDG cleat on exterior face; screw-and-neoprene washers on interior face at 600 mm o.c. max.</li>
      <li>Backer rod + low-modulus PU sealant at coping/cladding interface.</li>
      <li>Min. 200 mm vertical leg of membrane above finished roof per industry practice; termination bar optional.</li>

      <li>Top plate: double 38&#215;89 lap-jointed at partition intersections.</li>
      <li>Cavity insulation: 89 mm mineral-fibre batt (friction-fit, no gaps/compression).</li>
      <li>Facing: 12.7 mm Type X gypsum both sides (moisture-resistant at bath wet-face).</li>
      <li>Fasteners: 32 mm drywall screws, 200 mm o.c. perimeter, 300 mm o.c. field.</li>
      <li>Acoustic sealant: continuous bead at perimeter, penetrations, and back-to-back boxes.</li>
      <li>Target rating: STC &#8805; 45 (tested); add resilient channel one side to reach STC 50 at bath wall.</li>

  header.sheet-header { display:flex; justify-content:space-between; align-items:baseline; padding-bottom:.5rem; border-bottom:2px solid var(--ink); margin-bottom:.75rem; }
  header.sheet-header h1 { margin:0; font-size:1rem; letter-spacing:.7px; text-transform:uppercase; }
  header.sheet-header .meta { font-size:.75rem; color:#555; letter-spacing:.4px; }
  svg.sheet { display:block; width:100%; height:auto; background:#fff; border:1px solid #888; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  details { margin:1rem 0 0; border:1px solid var(--rule); border-radius:6px; padding:.65rem 1rem; background:#fff; }
  details summary { cursor:pointer; font-weight:600; color:var(--accent); }
  details ul { margin:.5rem 0 0 1rem; }
  details li { margin-bottom:.25rem; font-size:.9rem; }
  .tech-note { margin-top:1rem; padding:.85rem 1rem; background:var(--bg); border-left:4px solid #9c7a00; font-size:.85rem; }
  code.ref { background:#eaeaea; padding:1px 5px; border-radius:3px; font-size:.85em; font-family: "SF Mono", Menlo, monospace; }
</style>

    <summary>M-101: MEP coordination — 200 A service · ≈9000 BTU/h mini-split · HRV · PEX + ABS DWV · Expand for full spec</summary>
    <ul>
      <li>Electrical service: 200 A combination panel in bedroom closet (CSA C22.1); grid-connected single-phase 120/240 V.</li>
      <li>Branch circuits: 2 × 20 A GFCI kitchen small-appliance; 1 × 20 A bath GFCI; 1 × 15 A lighting (entry + 3 zones, 3-way at entry); 4 × 15 A general receptacles per OBC 9.34 (≈1 per 3.6 m of usable wall); dedicated 15 A HRV; 15 A mini-split indoor; 20 A/240 V mini-split condenser.</li>
      <li>Life safety: interconnected hardwired smoke alarms in bedroom, hall, and kitchen-adjacent living zone; CO alarm in hall within 5 m of bedroom door; battery backup per OBC 9.10.19.</li>
      <li>HVAC — heating/cooling: wall-mounted ductless mini-split head ≈ 9 000 BTU/h (2.6 kW) nominal cooling / 12 000 BTU/h heating @ -15 °C; HSPF ≥ 10, SEER ≥ 20; insulated Cu refrigerant line set in interior ceiling chase to NE-corner exterior condenser.</li>

      <li>Plumbing — water: 20 mm PEX cold/hot main from south-end service entry to bath manifold; 13 mm PEX home-runs to each fixture with ¼-turn shut-offs; water-heater type: electric storage tank (40 gal) or heat-pump water-heater — see P-501.</li>
