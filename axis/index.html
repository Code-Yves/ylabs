<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Axis Modular SIP Series — Interactive 3D Model</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Roboto+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  /* ───────────────────────────────────────────────────────
     BLUEPRINT ENGINEERING PALETTE
     ─────────────────────────────────────────────────────── */
  :root {
    --bp-bg:            #0a1929;   /* deep navy "blueprint" */
    --bp-bg-2:          #0f2444;
    --bp-panel:         rgba(16, 32, 58, 0.80);
    --bp-panel-bright:  rgba(22, 46, 80, 0.88);
    --bp-line:          rgba(125, 211, 252, 0.22);  /* cyan hairline */
    --bp-line-strong:   rgba(186, 230, 253, 0.55);
    --bp-text:          #e0f2fe;   /* near-white with blue tint */
    --bp-text-dim:      #94a3b8;   /* slate */
    --bp-accent:        #38bdf8;   /* sky-500 — primary accent */
    --bp-accent-hot:    #fbbf24;   /* amber — selection / action */
    --bp-danger:        #f87171;
    --bp-grid-minor:    rgba(125, 211, 252, 0.06);
    --bp-grid-major:    rgba(186, 230, 253, 0.16);
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bp-bg);
    background-image:
      linear-gradient(var(--bp-grid-minor) 1px, transparent 1px),
      linear-gradient(90deg, var(--bp-grid-minor) 1px, transparent 1px),
      linear-gradient(var(--bp-grid-major) 1px, transparent 1px),
      linear-gradient(90deg, var(--bp-grid-major) 1px, transparent 1px);
    background-size: 20px 20px, 20px 20px, 100px 100px, 100px 100px;
    background-position: -1px -1px;
    font-family:'Roboto Mono', 'Space Mono', 'Courier New', monospace;
    overflow:hidden; color:var(--bp-text);
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
  }
  canvas { display:block; position:absolute; inset:0; width:100%; height:100%; }

  /* ── Title bar ── */
  #titlebar {
    position:absolute; top:0; left:0; right:0; z-index:20;
    background:linear-gradient(180deg, rgba(10,25,41,.95) 0%, rgba(10,25,41,0) 100%);
    padding:22px 28px 44px; pointer-events:none;
  }
  #titlebar h1 {
    font-family:'Space Mono','Roboto Mono',monospace;
    font-size:15px; color:var(--bp-text); font-weight:700;
    letter-spacing:1.8px; line-height:1.3;
    text-transform:uppercase;
  }
  #titlebar h1::before {
    content:"▸ "; color:var(--bp-accent); font-weight:400;
  }
  #titlebar p {
    font-family:'Roboto Mono',monospace;
    font-size:10.5px; color:var(--bp-text-dim); margin-top:6px;
    letter-spacing:1.2px; font-weight:400;
    text-transform:uppercase;
  }

  /* ── Shared glass surface ── */
  .glass {
    background:var(--bp-panel);
    backdrop-filter:blur(18px) saturate(130%);
    -webkit-backdrop-filter:blur(18px) saturate(130%);
    border:1px solid var(--bp-line);
    border-radius:4px;   /* sharper corners, more technical */
    box-shadow:0 12px 40px rgba(0,0,0,.55), 0 0 0 1px rgba(125,211,252,.04) inset;
  }

  /* ── Info panel ── */
  #info {
    position:absolute; top:82px; right:18px; width:306px;
    max-height:calc(100vh - 100px);
    padding:20px 20px 18px; z-index:20;
    transition:opacity .22s, transform .22s;
    pointer-events:auto;
    overflow-y:auto; overflow-x:hidden;
    overscroll-behavior:contain;
  }
  #info::-webkit-scrollbar { width:6px; }
  #info::-webkit-scrollbar-thumb { background:rgba(100,181,246,.3); border-radius:3px; }
  #info::-webkit-scrollbar-thumb:hover { background:rgba(100,181,246,.55); }
  #info::-webkit-scrollbar-track { background:transparent; }
  #info.hidden { opacity:0; transform:translateX(8px); pointer-events:none !important; }
  #info h3 {
    font-family:'Space Mono','Roboto Mono',monospace;
    font-size:12px; color:var(--bp-text); font-weight:700;
    margin-bottom:12px; line-height:1.4;
    letter-spacing:1.5px; padding-right:32px;
    text-transform:uppercase;
    padding-bottom:8px;
    border-bottom:1px solid var(--bp-line);
  }
  #info h3::before {
    content:"◼ "; color:var(--bp-accent); font-weight:400;
  }
  .fact {
    font-family:'Roboto Mono',monospace;
    font-size:10.5px; color:var(--bp-text); font-weight:400;
    padding:7px 0 7px 16px;
    border-bottom:1px dashed var(--bp-line);
    position:relative; line-height:1.55;
    letter-spacing:.3px;
  }
  .fact:last-child { border-bottom:none; }
  .fact::before {
    content:'▸'; position:absolute; left:0; top:7px;
    color:var(--bp-accent);
    font-size:10px;
    font-weight:700;
  }

  /* ── Info panel close (X) button ── */
  .info-close {
    position:absolute; top:12px; right:12px;
    width:26px; height:26px; border-radius:50%;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.09);
    color:#90a4ae; font-size:17px; line-height:1;
    cursor:pointer; pointer-events:auto;
    display:flex; align-items:center; justify-content:center;
    padding:0 0 2px 0; font-family:inherit; font-weight:300;
    transition:background .15s, color .15s, border-color .15s, transform .15s;
  }
  .info-close:hover {
    background:rgba(239,83,80,.18);
    color:#ffcdd2;
    border-color:rgba(239,83,80,.35);
    transform:rotate(90deg);
  }
  .info-close:focus { outline:none; }
  .info-close:focus-visible {
    outline:2px solid rgba(100,181,246,.45); outline-offset:2px;
  }

  /* ── Info panel drawing carousel ── */
  .info-drawing {
    margin-top:14px; padding:8px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    border-radius:8px;
    pointer-events:auto;
  }
  .info-drawing.hidden { display:none; }
  .drawing-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:6px; gap:6px;
  }
  .drawing-title-wrap {
    flex:1; text-align:center;
    display:flex; flex-direction:column; gap:1px;
  }
  #drawing-title {
    font-size:10px; color:#e3f2fd; font-weight:600;
    letter-spacing:.4px;
  }
  .drawing-counter {
    font-size:8.5px; color:#78909c; letter-spacing:1px;
    font-variant-numeric:tabular-nums;
  }
  .drawing-nav {
    background:rgba(100,181,246,.1); color:#b0bec5;
    border:1px solid rgba(100,181,246,.25); border-radius:5px;
    padding:3px 8px; font-size:10px;
    cursor:pointer; pointer-events:auto;
    transition:background .15s, color .15s;
  }
  .drawing-nav:hover { background:rgba(100,181,246,.28); color:#fff; }
  .drawing-canvas {
    background:#ffffff;
    border:1px solid #2a3440;
    border-radius:5px;
    padding:4px;
    aspect-ratio: 340/250;
    display:flex; align-items:center; justify-content:center;
    cursor:zoom-in;
    transition:box-shadow .15s;
  }
  .drawing-canvas:hover { box-shadow:0 0 0 1px #64b5f6, 0 2px 8px rgba(100,181,246,.35); }
  .drawing-canvas svg { width:100%; height:100%; display:block; }
  .drawing-canvas svg text { font-family:'Helvetica Neue', Arial, sans-serif; fill:#1a1e24; }
  .drawing-canvas svg .dim { font-size:6.5px; fill:#3d464d; }
  .drawing-canvas svg .label { font-size:7px; fill:#1a1e24; font-weight:bold; }
  .drawing-canvas svg .dim-line { stroke:#3d464d; stroke-width:0.3; fill:none; }
  .drawing-canvas svg .line-heavy { stroke:#1a1e24; stroke-width:1.2; fill:none; }
  .drawing-canvas svg .line-thin { stroke:#1a1e24; stroke-width:0.5; fill:none; }
  .drawing-canvas svg .fill-steel { fill:#c7c9cd; stroke:#1a1e24; stroke-width:0.6; }
  .drawing-canvas svg .fill-steel-dk { fill:#6d737a; stroke:#1a1e24; stroke-width:0.6; }
  .drawing-canvas svg .fill-wood { fill:#d4c2a2; stroke:#1a1e24; stroke-width:0.6; }
  .drawing-canvas svg .fill-insul { fill:#f2e6c4; stroke:#1a1e24; stroke-width:0.4; }
  .drawing-canvas svg .fill-osb { fill:#c9a876; stroke:#1a1e24; stroke-width:0.5; }
  .drawing-canvas svg .fill-paper { fill:#ffffff; stroke:#1a1e24; stroke-width:0.5; }
  .drawing-zoom-hint {
    position:absolute; top:6px; right:8px;
    background:rgba(26,30,36,.82); color:#cfd8dc;
    font-size:9px; letter-spacing:.5px;
    padding:3px 7px; border-radius:3px;
    pointer-events:none;
    border:1px solid rgba(100,181,246,.25);
  }

  /* ── Left sidebar (legend + actions + blueprint nav) ── */
  #sidebar {
    position:absolute; left:12px; top:82px; bottom:14px; width:162px;
    display:flex; flex-direction:column; gap:7px;
    padding:9px 7px 8px;
    overflow:hidden;
    z-index:20;
    transition:transform .26s ease, opacity .22s ease;
  }
  body.sidebar-hidden #sidebar {
    transform:translateX(-220px);
    opacity:0;
    pointer-events:none;
  }

  /* Collapse button inside sidebar top-right */
  .sidebar-collapse {
    position:absolute; top:8px; right:8px;
    width:22px; height:22px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.09);
    border-radius:50%;
    color:#90a4ae;
    font-size:16px; line-height:1;
    padding:0 0 2px 0;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-family:inherit; font-weight:300;
    transition:background .15s, color .15s, border-color .15s;
  }
  .sidebar-collapse:hover {
    background:rgba(100,181,246,.2);
    color:#e3f2fd;
    border-color:rgba(100,181,246,.4);
  }

  /* Re-open handle — shows when sidebar is hidden */
  #sidebar-reopen {
    position:absolute; top:90px; left:14px;
    width:36px; height:36px;
    border-radius:8px;
    color:#b0bec5; font-size:15px;
    padding:0; cursor:pointer;
    display:none; align-items:center; justify-content:center;
    font-family:inherit;
    z-index:20;
    transition:background .15s, color .15s;
  }
  #sidebar-reopen:hover { color:#e3f2fd; background:rgba(100,181,246,.12); }
  body.sidebar-hidden #sidebar-reopen { display:flex; }
  .sidebar-title {
    font-size:9.5px; color:#90a4ae; text-transform:uppercase;
    letter-spacing:2px; font-weight:600;
    padding:2px 30px 0 4px;  /* right padding to clear the × collapse button */
  }
  .sidebar-actions {
    display:flex; flex-direction:column; gap:4px;
    padding-bottom:4px;
    border-bottom:1px solid rgba(255,255,255,.06);
  }
  .sidebar-actions-bottom {
    margin-top:6px;
    padding-top:6px;
    border-top:1px solid rgba(255,255,255,.06);
    border-bottom:none;
    padding-bottom:0;
  }
  /* Top-of-sidebar action stack — sits below the ‹ collapse chevron, not beside it,
     so every row has the same width as the legend chips below it */
  .sidebar-actions-top {
    padding-top:26px;          /* clear the 22px chevron at top:8px */
    margin-bottom:4px;
  }
  .sidebar-actions-top .sa-row { width:100%; }
  .sidebar-actions-top .bar-btn { box-sizing:border-box; }
  .sa-row {
    display:flex; gap:4px;
  }
  .sa-row .bar-btn { flex:1; text-align:center; padding:5px 4px; min-width:0; }
  .sa-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:3px;
  }
  .sa-grid .bar-btn {
    padding:5px 3px; font-size:9.5px; text-align:center; min-width:0;
    letter-spacing:.25px;
  }
  .bar-btn-wide {
    background:rgba(251,191,36,.12);
    border-color:rgba(251,191,36,.45);
    color:var(--bp-accent-hot);
  }
  /* Configuration dropdown — replaces the 4-button Single/Stacked/Bungalow/Duplex grid */
  .cfg-row { align-items:center; }
  .cfg-label {
    font-family:'Space Mono','Roboto Mono',monospace;
    font-size:8.5px; letter-spacing:1.8px; text-transform:uppercase;
    color:var(--bp-accent); font-weight:600;
    padding-left:2px; flex:0 0 auto;
  }
  .cfg-select {
    flex:1; min-width:0;
    background:rgba(56,189,248,.04); color:var(--bp-text);
    border:1px solid var(--bp-line); border-radius:2px;
    padding:5px 22px 5px 8px; font-size:9.5px;
    font-family:'Space Mono','Roboto Mono',monospace;
    font-weight:400; letter-spacing:1.2px;
    text-transform:uppercase; cursor:pointer;
    appearance:none; -webkit-appearance:none; -moz-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8'><path fill='%2338bdf8' d='M6 8 0 0h12z'/></svg>");
    background-repeat:no-repeat;
    background-position:right 8px center;
    background-size:8px 6px;
    transition:background-color .18s, border-color .18s, box-shadow .18s;
  }
  .cfg-select:hover { border-color:var(--bp-accent); background-color:rgba(56,189,248,.10); }
  .cfg-select:focus {
    outline:none; border-color:var(--bp-accent);
    box-shadow:0 0 0 1px var(--bp-accent) inset;
    background-color:rgba(56,189,248,.15);
  }
  .cfg-select option {
    background:#0f1a24; color:var(--bp-text);
    font-family:'Space Mono','Roboto Mono',monospace;
  }
  .bar-btn-wide:hover {
    background:rgba(251,191,36,.25) !important;
    border-color:var(--bp-accent-hot) !important;
    color:#fff !important;
  }
  .sidebar-title {
    font-family:'Space Mono','Roboto Mono',monospace !important;
    font-size:8.5px !important; color:var(--bp-accent) !important;
    letter-spacing:2.8px !important;
    padding-left:6px !important;
    border-left:2px solid var(--bp-accent);
    background:linear-gradient(90deg, rgba(56,189,248,.1), transparent);
  }

  /* ── Shop Drawings modal (full-screen overlay, separate-window feel) ───── */
  #shopdrawings-modal {
    position:fixed; inset:0;
    background:rgba(10,20,32,.98);
    z-index:1000;
    display:flex; flex-direction:column;
  }
  #shopdrawings-modal.hidden { display:none !important; }
  .sd-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 20px;
    background:rgba(14,24,38,.98);
    border-bottom:1px solid rgba(100,181,246,.3);
    color:#eceff1;
    flex-shrink:0;
  }
  .sd-title { display:flex; align-items:center; gap:12px; }
  .sd-tag {
    font-size:9.5px; font-weight:700; letter-spacing:2.5px;
    color:#64b5f6;
    padding:4px 9px;
    border:1px solid rgba(100,181,246,.4);
    border-radius:4px;
    background:rgba(100,181,246,.08);
  }
  .sd-sub {
    font-size:12.5px; font-weight:500; letter-spacing:.4px;
    color:#cfd8dc;
  }
  .sd-close {
    background:transparent;
    border:1px solid rgba(255,255,255,.18);
    color:#90a4ae;
    width:32px; height:32px; border-radius:50%;
    cursor:pointer;
    font-size:20px; line-height:1;
    display:flex; align-items:center; justify-content:center;
    padding:0 0 2px 0;
    font-family:inherit; font-weight:300;
    transition:background .15s, color .15s, border-color .15s, transform .2s;
  }
  .sd-close:hover {
    background:rgba(239,83,80,.22);
    color:#ffcdd2;
    border-color:rgba(239,83,80,.5);
    transform:rotate(90deg);
  }
  .sd-body {
    flex:1; min-height:0;
    background:#2a2a2a;
    overflow:auto;
  }
  #shopdrawings-frame {
    border:none;
    width:100%; height:100%;
    background:#2a2a2a;
    display:block;
  }

  /* ═══ Blueprints Viewer (full-featured) ═══ */
  #bp-viewer {
    position:fixed; inset:0;
    background:rgba(10,20,32,.985);
    z-index:1100;
    display:none; flex-direction:column;
    color:#eceff1;
  }
  #bp-viewer.show { display:flex; }
  .bpv-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 18px;
    background:rgba(14,24,38,.98);
    border-bottom:1px solid rgba(100,181,246,.3);
    flex-shrink:0;
  }
  .bpv-title { display:flex; align-items:center; gap:12px; }
  .bpv-tag {
    font-size:9.5px; font-weight:700; letter-spacing:2.5px;
    color:#64b5f6;
    padding:4px 9px;
    border:1px solid rgba(100,181,246,.4);
    border-radius:4px;
    background:rgba(100,181,246,.08);
  }
  .bpv-sub {
    font-size:12.5px; font-weight:500; letter-spacing:.4px;
    color:#cfd8dc;
  }
  .bpv-sub b { color:#fff; font-weight:600; }
  .bpv-close {
    background:transparent; border:1px solid rgba(255,255,255,.18);
    color:#90a4ae;
    width:32px; height:32px; border-radius:50%;
    cursor:pointer; font-size:20px; line-height:1;
    display:flex; align-items:center; justify-content:center;
    padding:0 0 2px 0; font-weight:300;
    transition:background .15s, color .15s, border-color .15s, transform .2s;
  }
  .bpv-close:hover {
    background:rgba(239,83,80,.22); color:#ffcdd2;
    border-color:rgba(239,83,80,.5); transform:rotate(90deg);
  }

  .bpv-toolbar {
    display:flex; align-items:center; gap:6px;
    padding:8px 14px;
    background:rgba(18,28,42,.98);
    border-bottom:1px solid rgba(100,181,246,.18);
    flex-shrink:0;
    font-size:11px;
  }
  .bpv-tbtn {
    background:rgba(100,181,246,.08);
    color:#cfd8dc;
    border:1px solid rgba(100,181,246,.25);
    border-radius:4px;
    padding:5px 10px; font-size:10.5px;
    cursor:pointer; font-weight:500; letter-spacing:.3px;
    font-family:inherit;
    transition:background .15s, color .15s, border-color .15s;
    display:inline-flex; align-items:center; gap:5px;
  }
  .bpv-tbtn:hover:not(:disabled) { background:rgba(100,181,246,.22); color:#fff; border-color:rgba(100,181,246,.55); }
  .bpv-tbtn:disabled { opacity:.35; cursor:default; }
  .bpv-tbtn-primary { background:#1976d2; border-color:#1976d2; color:#fff; }
  .bpv-tbtn-primary:hover:not(:disabled) { background:#1e88e5; border-color:#1e88e5; }
  .bpv-zoom {
    display:inline-flex; align-items:center; gap:0;
    border:1px solid rgba(100,181,246,.25); border-radius:4px;
    overflow:hidden;
  }
  .bpv-zoom .bpv-tbtn { border:none; border-radius:0; background:transparent; padding:5px 9px; }
  .bpv-zoom .bpv-tbtn:hover:not(:disabled) { background:rgba(100,181,246,.18); }
  .bpv-zoom-level {
    display:inline-flex; align-items:center; justify-content:center;
    min-width:48px; font-size:10.5px; font-variant-numeric:tabular-nums;
    color:#b0bec5; padding:0 6px;
    border-left:1px solid rgba(100,181,246,.15);
    border-right:1px solid rgba(100,181,246,.15);
    background:rgba(100,181,246,.04);
  }
  .bpv-div { width:1px; height:20px; background:rgba(100,181,246,.2); margin:0 4px; }
  .bpv-spacer { flex:1; }
  .bpv-current-sheet { color:#90a4ae; font-size:10.5px; letter-spacing:.4px; }
  .bpv-current-sheet b { color:#e3f2fd; font-weight:600; letter-spacing:.6px; }
  .bpv-toast {
    position:fixed; left:50%; top:84px;
    transform:translateX(-50%);
    background:rgba(25,118,210,.95); color:#fff;
    padding:8px 16px; border-radius:4px;
    font-size:11.5px; letter-spacing:.5px; font-weight:500;
    box-shadow:0 6px 24px rgba(0,0,0,.5);
    z-index:1200;
    opacity:0; pointer-events:none;
    transition:opacity .25s, transform .25s;
  }
  .bpv-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  .bpv-body {
    flex:1; min-height:0;
    display:flex;
  }
  .bpv-rail {
    width:240px; flex-shrink:0;
    background:rgba(14,22,34,.98);
    border-right:1px solid rgba(100,181,246,.18);
    overflow-y:auto;
    padding:12px 0 20px 0;
  }
  .bpv-rail::-webkit-scrollbar { width:5px; }
  .bpv-rail::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); border-radius:3px; }
  .bpv-cat {
    font-size:9.5px; letter-spacing:2px; font-weight:700;
    color:#64b5f6; text-transform:uppercase;
    padding:12px 14px 6px 14px;
    border-bottom:1px solid rgba(100,181,246,.12);
    margin-bottom:4px;
  }
  .bpv-item {
    display:flex; align-items:center; gap:10px;
    padding:8px 14px;
    cursor:pointer;
    border-left:3px solid transparent;
    transition:background .12s, border-color .12s;
  }
  .bpv-item:hover { background:rgba(100,181,246,.08); }
  .bpv-item.active {
    background:rgba(25,118,210,.22);
    border-left-color:#64b5f6;
  }
  .bpv-item-num {
    font-size:10px; letter-spacing:.5px; font-weight:700;
    color:#64b5f6;
    min-width:42px;
    font-variant-numeric:tabular-nums;
  }

  .bp-sheet {

  /* ── Blueprint annotations (overlay on canvas in blueprint mode) ─────────── */
  #annotations {

  body.blueprint #annotations { display:block; }

  .ann-dim-sm {

  /* ── Chip list (vertical, grouped by category in the sidebar) ── */

  /* ── Layer chip (stacked vertically; full row clickable) ── */
  .li {
    display:flex; align-items:center; gap:8px;

    border:1px solid transparent;

    text-shadow:0 0 2px rgba(10,25,41,.8);

  .li-swatch::after {
    content:attr(data-num);

  }
  .li:hover .li-swatch { transform:scale(1.08); }
  .li-label {
    font-family:'Roboto Mono','Space Mono',monospace;
    font-size:10px; color:var(--bp-text); font-weight:400;
    letter-spacing:.5px; line-height:1.25;
    text-transform:uppercase;
    transition:color .15s;
  }

  /* Per-chip info button — blueprint square (more technical than circle) */
  .li-info {
    width:16px; height:16px; padding:0;
    border-radius:0;  /* square — technical look */
    background:transparent;
    border:1px solid var(--bp-line);
    color:var(--bp-accent);
    font-family:'Space Mono',monospace;
    font-weight:700;
    font-size:9px; line-height:1;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; margin-right:2px;
    transition:background .15s, color .15s, border-color .15s, transform .12s;
  }
  .li-info:hover {
    background:var(--bp-accent);
    color:var(--bp-bg);
    border-color:var(--bp-accent);
  }
  .li-info:focus { outline:none; }
  .li-info:focus-visible {
    outline:1px solid var(--bp-accent-hot); outline-offset:2px;
  }
  .li.active .li-info {
    background:var(--bp-accent);
    color:var(--bp-bg);
    border-color:var(--bp-accent);
  }

  /* Hidden (toggled off) state — keep label crisp; only the swatch + strikethrough signal state */
  .li.li-hidden .li-swatch {
    background:transparent;
    box-shadow:inset 0 0 0 1.2px var(--bp-line);
    color:var(--bp-text-dim);
    text-shadow:none;
  }
  .li.li-hidden .li-label {
    color:var(--bp-text-dim);
    text-decoration:line-through;
    text-decoration-color:var(--bp-accent);
    text-decoration-thickness:1px;
  }
  /* ── Drawing zoom modal (overlays the whole page) ── */
  #dwg-modal {
    position:fixed; inset:0;
    background:rgba(14,18,24,.92);
    z-index:10000;
    display:none;
    align-items:center; justify-content:center;
    backdrop-filter:blur(6px);
  }
  #dwg-modal.show { display:flex; }
  #dwg-modal-inner {
    position:relative;
    width:min(96vw, 1400px);
    max-height:calc(100vh - 40px);
    display:flex; flex-direction:column;
    background:#1a1e24;
    border:1px solid #3d464d;

  }
  #dwg-modal-header {
    padding:10px 16px;
    border-bottom:1px solid #2d3741;
    display:flex; align-items:center; justify-content:space-between;
    gap:12px;
  }
  #dwg-modal-title {
    font-size:13px; font-weight:600; color:#eceff1; letter-spacing:.4px;
  }
  #dwg-modal-sub {
    font-size:10px; color:#78909c; margin-top:2px;
  }
  #dwg-modal-actions { display:flex; gap:8px; }
  .dwg-btn {
    background:#37474f; color:#eceff1; border:1px solid #4d6070;
    padding:7px 14px; border-radius:4px; font-size:11px;
    letter-spacing:.5px; cursor:pointer;
    transition:background .15s;
  }
  .dwg-btn:hover { background:#455a64; }
  .dwg-btn-primary { background:#1976d2; border-color:#1976d2; }
  .dwg-btn-primary:hover { background:#1e88e5; }
  #dwg-modal-sheet {
    background:#ffffff;
    padding:18px;
    flex:1;
    overflow:auto;
    display:flex; align-items:center; justify-content:center;
    border-radius:0 0 6px 6px;
  }
  #dwg-modal-sheet svg {
    width:100%;
    max-width:1200px;
    height:auto;
    display:block;
  }
  /* ── Print mode: hide everything except the drawing sheet ── */
  @media print {
    @page { size: 11in 8.5in landscape; margin: 0.25in; }
  }
  body.dwg-printing > *:not(#dwg-modal),
  body.dwg-printing #dwg-modal-header { /* hide UI chrome when printing */ }
  @media print {
    body.dwg-printing { background:#fff !important; }
    body.dwg-printing > * { visibility:hidden !important; }
    body.dwg-printing #dwg-modal,
    body.dwg-printing #dwg-modal * { visibility:visible !important; }
    body.dwg-printing #dwg-modal {
      position:fixed !important; inset:0 !important;
      background:#fff !important; backdrop-filter:none !important;
      display:flex !important;
    }
    body.dwg-printing #dwg-modal-inner {
      background:#fff !important; border:0 !important; box-shadow:none !important;
      width:100% !important; max-height:none !important;
    }
    body.dwg-printing #dwg-modal-header { display:none !important; }
    body.dwg-printing #dwg-modal-sheet {
      background:#fff !important; padding:0 !important;
      width:100% !important; height:100vh !important;
    }
    body.dwg-printing #dwg-modal-sheet svg {
      width:100% !important; height:100% !important; max-width:none !important;
    }
  }
  /* ── Assembly-sequence intro ────────────────────────────────────────────── */
  #assembly-narrator {
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    z-index:1500;
    display:flex; align-items:center; gap:10px;
    padding:7px 14px 7px 12px;
    background:rgba(10,18,26,.82);
    border:1px solid var(--bp-accent);
    border-radius:3px;
    font-family:'Space Mono','Roboto Mono',monospace;
    font-size:10px; letter-spacing:2px; text-transform:uppercase;
    color:var(--bp-text);
    box-shadow:0 0 0 1px rgba(56,189,248,.15), 0 8px 24px rgba(0,0,0,.35);
    backdrop-filter:blur(6px);
    opacity:0; transition:opacity .35s ease;
    pointer-events:none;
  }
  #assembly-narrator.visible { opacity:1; }
  #assembly-narrator .narr-step {
    font-size:9px; color:var(--bp-accent); font-weight:600; letter-spacing:1.6px;
  }
  #assembly-narrator .narr-sep {
    width:1px; height:12px; background:rgba(56,189,248,.3);
  }
  #assembly-narrator .narr-text {
    font-size:11px; color:#fff; font-weight:600; letter-spacing:1.4px;
  }
  #assembly-narrator .narr-dot {
    width:6px; height:6px; border-radius:50%;
    background:var(--bp-accent);
    box-shadow:0 0 8px var(--bp-accent);
    animation:narr-pulse 1.1s ease-in-out infinite;
  }
  @keyframes narr-pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%     { opacity:.35; transform:scale(.7); }
  }
  #assembly-skip {
    position:fixed; top:54px; left:50%; transform:translateX(-50%);
    z-index:1500;
    padding:4px 12px;
    background:rgba(10,18,26,.72);
    border:1px solid rgba(255,255,255,.12);
    border-radius:2px;
    color:#90a4ae;
    font-family:'Space Mono','Roboto Mono',monospace;
    font-size:9px; letter-spacing:1.8px; text-transform:uppercase;
    cursor:pointer;
    transition:color .15s, border-color .15s, background .15s;
  }
  #assembly-skip:hover {
    color:#e3f2fd; border-color:var(--bp-accent);
    background:rgba(56,189,248,.12);
  }
</style>
</head>

<canvas id="c"></canvas>
<div id="annotations"></div>

<!-- Assembly-sequence intro (hidden until init fires; auto-removed after sequence) -->
<div id="assembly-narrator" role="status" aria-live="polite">

  <span class="narr-step" id="narr-step">00 / 00</span>

</div>
<button type="button" id="assembly-skip" style="display:none;" onclick="assemblyFinish()" title="Skip the construction-sequence intro">Skip ▶</button>

<div id="titlebar">
  <h1>Axis Modular SIP Series — Grid-Connected Edition</h1>
  <p>42′ × 12′ · 525 SF · 1 Bedroom · SIP Panels · Helical Piers · Hydro / Well / Septic</p>
</div>

<button id="sidebar-reopen" class="glass" onclick="toggleSidebar()" aria-label="Show sidebar" title="Show components">☰</button>

<div id="info" class="glass hidden">
  <button class="info-close" onclick="closeInfo()" aria-label="Close" title="Close">×</button>

  <div id="info-facts"></div>

<!-- ── Drawing enlarge modal (in-page overlay — avoids popup blockers) ── -->
<div id="dwg-modal" onclick="if(event.target===this) closeDwgModal()" role="dialog" aria-modal="true" aria-labelledby="dwg-modal-title">

      <div>
        <div id="dwg-modal-title">—</div>
        <div id="dwg-modal-sub">Axis Modular SIP Series · Issued for Construction</div>
      </div>
      <div id="dwg-modal-actions">

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════════════════
//  COMPONENT DATA
// ═══════════════════════════════════════════════════════════════════════════════
// ── Official architectural-drawing wrapper ───────────────────────────────────
// Builds an SVG with a proper border, title block (drawing number + scale),
// shared material hatch patterns, and a content area.  Per-drawing content
// uses a 320×190 coordinate space (title block is at y=196–238).
// ─── Sheet index — master list for cross-reference and title-block "sheet N of N" ───
const SHEET_INDEX = [
  // Structural (6)
  { n:'S-101',  t:'HELICAL PIER — SECTION',              disc:'S' },
  { n:'S-102',  t:'SADDLE CAP — PLAN',                   disc:'S' },
  { n:'S-201',  t:'I-JOIST — SECTION A-A',               disc:'S' },
  { n:'S-202',  t:'FLOOR FRAMING — PLAN',                disc:'S' },
  { n:'S-301',  t:'HSS 6×4×3/16″ — SECTION',             disc:'S' },
  { n:'S-302',  t:'COLUMN-BEAM CONNECTION',              disc:'S' },
  // Architectural (9)
  { n:'A-201',  t:'SUBFLOOR DECK — SECTION',             disc:'A' },
  { n:'A-401',  t:'SIP PANEL — SECTION',                 disc:'A' },

// ═══════════════════════════════════════════════════════════════════════════════
//  RENDERER / SCENE / CAMERA
// ═══════════════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const W = () => window.innerWidth, H = () => window.innerHeight;

// ── BLUEPRINT palette (hex) used by 3D scene + blueprint-mode toggle ──
const BP_SKY       = 0x0a1929;   // deep navy
const BP_GROUND    = 0x0f2a4a;   // lighter navy ground
const BP_GRID_MAJ  = 0x7dd3fc;   // cyan major
const BP_GRID_MIN  = 0x1e40af;   // subtle blue minor

const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(BP_SKY);              // blueprint navy "sky"
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.LinearToneMapping;
renderer.toneMappingExposure = 1.12;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(BP_SKY, 0.0025);

const camera = new THREE.PerspectiveCamera(46, W()/H(), 0.1, 500);
camera.position.set(30, 22, 44);

// Orthographic camera for blueprint / top-down view
const ORTHO_VIEW = 26;                      // half-height of view in world units
const orthoCam = new THREE.OrthographicCamera(
  -ORTHO_VIEW, ORTHO_VIEW, ORTHO_VIEW, -ORTHO_VIEW, 0.1, 500
);
orthoCam.position.set(0, 60, 0);
orthoCam.up.set(0, 0, -1);                  // so +Z points "down" in the image
orthoCam.lookAt(0, 0, 0);
function updateOrthoFrustum() {
  const aspect = W() / H();
  orthoCam.left   = -ORTHO_VIEW * aspect;
  orthoCam.right  =  ORTHO_VIEW * aspect;
  orthoCam.top    =  ORTHO_VIEW;
  orthoCam.bottom = -ORTHO_VIEW;
  orthoCam.updateProjectionMatrix();
}
updateOrthoFrustum();
let activeCam = camera;

const orbit = new THREE.OrbitControls(camera, canvas);
orbit.enableDamping = true;
orbit.dampingFactor = 0.06;
orbit.minDistance = 8;
orbit.maxDistance = 110;
orbit.maxPolarAngle = Math.PI / 2.05;
orbit.target.set(0, 5, 0);
orbit.update();

// Separate controls for the orthographic (blueprint) camera — allow zoom + pan,
// disable rotation so the top-down view is locked
const orthoOrbit = new THREE.OrbitControls(orthoCam, canvas);
orthoOrbit.enableRotate = false;
orthoOrbit.enableZoom   = true;
orthoOrbit.enablePan    = true;
orthoOrbit.zoomSpeed    = 1.2;
orthoOrbit.panSpeed     = 0.9;
orthoOrbit.minZoom      = 0.35;
orthoOrbit.maxZoom      = 6.0;
orthoOrbit.target.set(0, 0, 0);
orthoOrbit.enabled = false;
orthoOrbit.update();

// ── Lighting — cool blueprint tone ───────────────────────────────────────────
const hemi = new THREE.HemisphereLight(0xcfe8ff, 0x1e3a5f, 1.35);
hemi.position.set(0, 50, 0);
scene.add(hemi);

// Cool directional "sun" — slight blue tint so shadows read as deep navy
const sun = new THREE.DirectionalLight(0xeaf4ff, 0.55);
sun.position.set(38, 65, 28);
sun.castShadow = true;
sun.shadow.mapSize.set(4096, 4096);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 200;
sun.shadow.camera.left = -60; sun.shadow.camera.right = 60;
sun.shadow.camera.top  =  60; sun.shadow.camera.bottom = -60;
sun.shadow.bias = -0.0004;
sun.shadow.normalBias = 0.02;
sun.shadow.radius = 6;
scene.add(sun);

// Opposite fill — cool tint
const fill = new THREE.DirectionalLight(0x7dd3fc, 0.28);
fill.position.set(-18, 12, -12);
scene.add(fill);

// ── Ground plane — deep navy with a subtle gradient toward the horizon ──────
const gnd = new THREE.Mesh(
  new THREE.PlaneGeometry(300,300),
  new THREE.MeshStandardMaterial({ color:BP_GROUND, roughness:0.95, metalness:0 })
);
gnd.rotation.x = -Math.PI/2; gnd.receiveShadow = true;
scene.add(gnd);

// ── Blueprint-style grid: MAJOR + minor divisions ──
// Minor grid: every 1' (1 world unit), subtle cyan
const gridMinor = new THREE.GridHelper(240, 240, BP_GRID_MIN, BP_GRID_MIN);
gridMinor.material.opacity = 0.18; gridMinor.material.transparent = true;
gridMinor.position.y = 0.01;
scene.add(gridMinor);
// Major grid: every 10' — brighter cyan for readability
const gridMajor = new THREE.GridHelper(240, 24, BP_GRID_MAJ, BP_GRID_MAJ);
gridMajor.material.opacity = 0.35; gridMajor.material.transparent = true;
gridMajor.position.y = 0.012;
scene.add(gridMajor);
// Keep original name for backward compat (other code toggles "grid")
const grid = gridMajor;

// ── Driveway strip — lighter stripe against navy ground ──────────────────────
const driveway = new THREE.Mesh(
  new THREE.PlaneGeometry(6, 20),
  new THREE.MeshStandardMaterial({ color:0x2d4d6e, roughness:1.0, metalness:0 })
);
driveway.rotation.x = -Math.PI/2;
driveway.position.set(0, 0.02, -31);
driveway.receiveShadow = true;
scene.add(driveway);

// ═══════════════════════════════════════════════════════════════════════════════
//  DIMENSION STRINGS — architectural annotation layer on the ground plane
//  Shows 42′ (length) × 12′ (width) footprint with hash marks at each end
// ═══════════════════════════════════════════════════════════════════════════════
const dimGroup = new THREE.Group();
dimGroup.name = 'dimensions';
scene.add(dimGroup);

const DIM_COLOR = 0xe0f2fe;    // near-white cyan for high contrast on navy
const DIM_Y     = 0.05;        // just above ground plane
function makeDimLine(ax, az, bx, bz) {
  const g = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(ax, DIM_Y, az), new THREE.Vector3(bx, DIM_Y, bz)
  ]);
  return new THREE.Line(g, new THREE.LineBasicMaterial({ color:DIM_COLOR, transparent:true, opacity:0.9 }));
}
function makeTickMark(cx, cz, len, axis) {   // axis 'x' or 'z' — tick is perpendicular
  const h = len / 2;
  const points = (axis === 'x')
    ? [ new THREE.Vector3(cx, DIM_Y, cz-h), new THREE.Vector3(cx, DIM_Y, cz+h) ]
    : [ new THREE.Vector3(cx-h, DIM_Y, cz), new THREE.Vector3(cx+h, DIM_Y, cz) ];
  const g = new THREE.BufferGeometry().setFromPoints(points);
  return new THREE.Line(g, new THREE.LineBasicMaterial({ color:DIM_COLOR, transparent:true, opacity:0.9 }));
}
// Canvas-based text sprite for "42' – 0"" labels — always camera-facing
function makeDimLabel(text, worldX, worldZ){
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,256,64);
  ctx.fillStyle = 'rgba(10,25,41,0.92)';
  ctx.fillRect(4,10,248,44);
  ctx.strokeStyle = '#7dd3fc'; ctx.lineWidth = 1;
  ctx.strokeRect(4,10,248,44);
  ctx.font = 'bold 26px "Space Mono", "Roboto Mono", monospace';
  ctx.fillStyle = '#e0f2fe';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 32);
  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  const mat = new THREE.SpriteMaterial({ map:tex, transparent:true, depthTest:false, depthWrite:false });
  const sp  = new THREE.Sprite(mat);
  sp.renderOrder = 100;
  sp.scale.set(6, 1.5, 1);          // 6 ft wide × 1.5 ft tall label
  sp.position.set(worldX, DIM_Y + 0.8, worldZ);
  return sp;
}

const DIM_OFFSET = 4;              // feet from building edge to dimension line
const BL_DIM = 42, BW_DIM = 12;

// LENGTH dimension (42′) — along south edge
const zDim = BW_DIM/2 + DIM_OFFSET;
dimGroup.add( makeDimLine(-BL_DIM/2, zDim, BL_DIM/2, zDim) );
dimGroup.add( makeTickMark(-BL_DIM/2, zDim, 0.8, 'x') );
dimGroup.add( makeTickMark( BL_DIM/2, zDim, 0.8, 'x') );
// Extension lines from building edge to dim line
dimGroup.add( makeDimLine(-BL_DIM/2, BW_DIM/2, -BL_DIM/2, zDim) );
dimGroup.add( makeDimLine( BL_DIM/2, BW_DIM/2,  BL_DIM/2, zDim) );

// ═══════════════════════════════════════════════════════════════════════════════
//  MESH HELPERS  (adds thin edge lines for architectural-drawing feel)
// ═══════════════════════════════════════════════════════════════════════════════
const selectables = [];
const EDGE_COLOR       = 0xbae6fd;       // light cyan edge — reads crisp against navy
const EDGE_COLOR_HEAVY = 0xe0f2fe;       // near-white for profile/cut lines
const EDGE_THRESHOLD   = 32;             // degrees — hides cylinder side seams

// Add thin edge lines for internal detail (default).
// Pass { heavy:true } for profile/cut lines — brighter + slightly thicker.
function addEdges(mesh, geo, opts) {
  opts = opts || {};
  const edgeGeo = new THREE.EdgesGeometry(geo, EDGE_THRESHOLD);
  const line = new THREE.LineSegments(
    edgeGeo,
    new THREE.LineBasicMaterial({
      color: opts.heavy ? EDGE_COLOR_HEAVY : EDGE_COLOR,
      transparent:true,
      opacity: opts.heavy ? 0.85 : 0.55,
      linewidth: opts.heavy ? 2 : 1
    })
  );
  line.renderOrder = opts.heavy ? 2 : 1;
  mesh.add(line);
  return mesh;
}

// Polygon offset keeps edge lines cleanly in front of their own mesh surfaces
// and reduces z-fighting between adjacent coplanar parts.
const PO = { polygonOffset:true, polygonOffsetFactor:1, polygonOffsetUnits:1 };

// Profile/cut layers get bold outline — SIP panels, roof, parapet
const HEAVY_EDGE_KEYS = new Set(['sip','roof','parapet','steel']);
function mkBox(w, h, d, color, key) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshStandardMaterial({ color, roughness:0.95, metalness:0, ...PO });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = mesh.receiveShadow = true;
  addEdges(mesh, geo, { heavy: HEAVY_EDGE_KEYS.has(key) });
  if (key) { mesh.userData.key = key; selectables.push(mesh); }
  return mesh;
}

function mkCyl(rt, rb, h, color, key, segs=16) {
  const geo = new THREE.CylinderGeometry(rt, rb, h, segs);
  const mat = new THREE.MeshStandardMaterial({ color, roughness:0.9, metalness:0.05, ...PO });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = mesh.receiveShadow = true;
  addEdges(mesh, geo);
  if (key) { mesh.userData.key = key; selectables.push(mesh); }
  return mesh;
}

function place(obj, x, y, z) { obj.position.set(x,y,z); scene.add(obj); return obj; }

// ═══════════════════════════════════════════════════════════════════════════════
//  BUILDING GEOMETRY  (all units = feet)
//  Building footprint: 42′ long (Z-axis) × 12′ wide (X-axis)
//  Centre at world origin (0,0,0).   Grade = y=0.
// ═══════════════════════════════════════════════════════════════════════════════
const BL=42, BW=12;       // building length, width
const FH=2.0;             // pier height above grade
const BH=0.5;             // steel chassis beam depth (HSS 6×4)
const JH=0.9;             // Parallam I-joist depth (2×11⅞″ real)
const FD=0.1;             // subfloor deck thickness (~1¼″)
const FT=BH+JH+FD;        // total floor assembly depth = 1.5 (stacked)
const WH=9.0, WT=0.5;     // wall height, wall/SIP thickness
const FL=FH+FT;           // interior floor level  = 3.5
const WT_y=FL+WH;         // wall top              = 12.5
const RT=0.35, PH=1.5;    // roof assembly thickness, parapet height

// Floor-framing layout
const JW=0.18;            // joist / rim-beam web width (~2″)
const BY=FH+BH/2;         // chassis beam centre Y = 2.25
const JY=FH+BH+JH/2;      // joist centre Y (sits ON TOP of chassis) = 2.95
const SC=0.04;            // pier saddle cap thickness
const rimX=BW/2-WT/2;     // rim-beam centre X = 5.75 (under wall centreline)
const cornerZ=BL/2-WT/2;  // end-wall centreline Z = 20.75 (corner column Z)
const TBH=BH;             // top rim-beam depth (matches chassis) = 0.5

// ── 1. Helical piers (aligned under the load line) ───────────────────────────
// 3×3 grid — outer rows sit directly under rim beams; centre row lands on the
// cross-beams that span between the rims at each row.
const pierGrid = [
  [-rimX,-16],[-rimX,0],[-rimX,16],
  [    0,-16],[    0,0],[    0,16],
  [ rimX,-16],[ rimX,0],[ rimX,16]
];
pierGrid.forEach(([px,pz]) => {
  // Helical screw pier shaft — grade up to the saddle cap
  place(mkCyl(0.15, 0.15, FH - SC, COMP.pier.hex, 'pier'), px, (FH - SC)/2, pz);
  // Pier saddle / bracket cap — sits on pier head, chassis beam lands on top
  place(mkBox(0.5, SC, 0.5, 0x58606a, 'pier'), px, FH - SC/2, pz);
});

// ── 2. Floor framing — STACKED: chassis (steel) → joists (Parallam) → deck ────

// Level 1 — Steel chassis (tagged 'steel') — Y = 2.0 → 2.5
// Rim beams run the LONG direction, centred under each wall, spanning to the
// corner columns (outer corners line up cleanly with the column grid).
place(mkBox(JW, BH, 2*cornerZ, COMP.steel.hex, 'steel'),  rimX, BY, 0);
place(mkBox(JW, BH, 2*cornerZ, COMP.steel.hex, 'steel'), -rimX, BY, 0);
// Cross-beams between rim beams — 3 at pier rows + 2 end rim beams at cornerZ
// (end rim beams close the chassis perimeter and support the middle of end walls)
const chassisSpan = 2 * (rimX - JW/2);   // clear between rim-beam inner faces
[-cornerZ, -16, 0, 16, cornerZ].forEach(cz => {
  place(mkBox(chassisSpan, BH, JW, COMP.steel.hex, 'steel'), 0, BY, cz);
});

// Level 2 — Parallam floor joists (tagged 'joists') — Y = 2.5 → 3.4
// Joists sit ON TOP of the chassis, running PERPENDICULAR to the rim beams,
// bearing on both rim beams (12′ clear span, rim-to-rim centre distance).
const joistLength = 2 * rimX;             // rim-beam centre to rim-beam centre
const joistStartZ = -BL/2 + WT + JW;
const joistEndZ   =  BL/2 - WT - JW;
const joistCount  = 26;                   // ~1.63′ O/C (~19.5″) over 41′
const joistPitch  = (joistEndZ - joistStartZ) / (joistCount - 1);
for (let i = 0; i < joistCount; i++) {
  const z = joistStartZ + i * joistPitch;
  place(mkBox(joistLength, JH, JW, COMP.joists.hex, 'joists'), 0, JY, z);
}

// Level 3 — Subfloor deck (tagged 'floor') — Y = 3.4 → 3.5
place(mkBox(BW, FD, BL, COMP.floor.hex, 'floor'), 0, FL - FD/2, 0);

// ── 3. Steel columns — inside wall envelope, bearing on chassis top ──────────
// Positioned on the wall centrelines (X = ±rimX) and at Z positions clear of
// all three long-wall window openings. Bottoms land on the chassis top
// (where the rim and cross beams are); tops meet the roof deck.
const colYBot  = FH + BH;              // 2.5  — chassis top (column bears here)
const colYTop  = WT_y;                 // 12.5 — wall top / roof bottom
const colH     = colYTop - colYBot;    // 10.0 ft
const colCY    = colYBot + colH/2;     // 7.5
const colSize  = 0.35;
// Column Z positions clear of window openings (windows at Z = ±12 and Z = 0)
const columnZs = [-cornerZ, -6, 6, cornerZ];
[-rimX, rimX].forEach(cx => {
  columnZs.forEach(cz => {
    place(mkBox(colSize, colH, colSize, COMP.steel.hex, 'steel'), cx, colCY, cz);
  });
});

// ── 4. SIP walls ─────────────────────────────────────────────────────────────
// South long wall (+X) — solid, no openings
place(mkBox(WT, WH, BL-WT*2, COMP.sip.hex, 'sip'), BW/2-WT/2, FL+WH/2, 0);

// North long wall (-X) — split into 4 segments between 3 window openings
// Windows centred at z = -12, 0, +12 (each 5′ wide → openings at ±14.5/±9.5 and ±2.5)
const nWX = -(BW/2-WT/2);
place(mkBox(WT, WH, 6, COMP.sip.hex, 'sip'), nWX, FL+WH/2, -17.5);  // end → window 1
place(mkBox(WT, WH, 7, COMP.sip.hex, 'sip'), nWX, FL+WH/2,  -6);    // window 1 → window 2
place(mkBox(WT, WH, 7, COMP.sip.hex, 'sip'), nWX, FL+WH/2,   6);    // window 2 → window 3
place(mkBox(WT, WH, 6, COMP.sip.hex, 'sip'), nWX, FL+WH/2,  17.5);  // window 3 → end

// WEST end wall — door opening 3′ wide × 7′ tall, centred
const DW=3, DH=7;
const wSide = (BW-WT*2-DW)/2;                              // = 4.0
place(mkBox(wSide,WH,WT, COMP.sip.hex,'sip'), -(BW/2-WT-wSide/2), FL+WH/2,     -BL/2+WT/2);
place(mkBox(wSide,WH,WT, COMP.sip.hex,'sip'),  (BW/2-WT-wSide/2), FL+WH/2,     -BL/2+WT/2);
place(mkBox(DW,WH-DH,WT, COMP.sip.hex,'sip'),  0, FL+DH+(WH-DH)/2,             -BL/2+WT/2);

// EAST end wall — picture window 5′ × 4′ with 1′ sill
const EW=5, EH=4, ES=1;
const eSide = (BW-WT*2-EW)/2;                              // = 3.0
place(mkBox(eSide,WH,WT, COMP.sip.hex,'sip'), -(BW/2-WT-eSide/2), FL+WH/2,      BL/2-WT/2);
place(mkBox(eSide,WH,WT, COMP.sip.hex,'sip'),  (BW/2-WT-eSide/2), FL+WH/2,      BL/2-WT/2);
place(mkBox(EW, ES,     WT, COMP.sip.hex,'sip'), 0, FL+ES/2,                     BL/2-WT/2);  // sill
place(mkBox(EW, WH-ES-EH, WT, COMP.sip.hex,'sip'), 0, FL+ES+EH+(WH-ES-EH)/2,   BL/2-WT/2);  // head

// NORTH long-wall windows — 3 units each 5′w × 3.5′h, 2.5′ sill
const NW=5, NH=3.5, NS=2.5;
[-12,0,12].forEach(wz => {
  // sill panel
  place(mkBox(WT,NS,NW, COMP.sip.hex,'sip'),        -BW/2+WT/2, FL+NS/2,         wz);
  // head panel
  place(mkBox(WT,WH-NS-NH,NW, COMP.sip.hex,'sip'),  -BW/2+WT/2, FL+NS+NH+(WH-NS-NH)/2, wz);
  // glass
  const gGeo = new THREE.BoxGeometry(0.06, NH, NW);
  const g = new THREE.Mesh(
    gGeo,
    new THREE.MeshStandardMaterial({ color:COMP.window.hex, transparent:true, opacity:0.3, roughness:0.2, metalness:0 })
  );
  g.castShadow=false; g.userData.key='window'; selectables.push(g);
  addEdges(g, gGeo);  // frame outline
  place(g, -BW/2+0.04, FL+NS+NH/2, wz);
});

// ── 5. Entry door ─────────────────────────────────────────────────────────────
place(mkBox(DW-0.12, DH, 0.12, COMP.door.hex, 'door'), 0, FL+DH/2, -BL/2+0.1);

// ── 6. East picture window glass ─────────────────────────────────────────────
const eglassGeo = new THREE.BoxGeometry(EW, EH, 0.06);
const eglass = new THREE.Mesh(
  eglassGeo,
  new THREE.MeshStandardMaterial({ color:COMP.window.hex, transparent:true, opacity:0.3, roughness:0.2, metalness:0 })
);
eglass.userData.key='window'; selectables.push(eglass);
addEdges(eglass, eglassGeo);  // frame outline
place(eglass, 0, FL+ES+EH/2, BL/2-0.06);

// ── 6b. Top rim-beam frame — steel perimeter at top of walls ─────────────────
// Closes the steel frame: chassis at bottom, columns up, top rim at top.
// Long rims run the full length (to the corner columns); end rims butt between;
// 2 inner cross-beams sit over the midspan columns at Z = ±6.
const TY = WT_y + TBH/2;                // top rim centre Y = 12.75
place(mkBox(JW, TBH, 2*cornerZ, COMP.steel.hex, 'steel'),  rimX, TY, 0);
place(mkBox(JW, TBH, 2*cornerZ, COMP.steel.hex, 'steel'), -rimX, TY, 0);
[-cornerZ, -6, 6, cornerZ].forEach(cz => {
  place(mkBox(chassisSpan, TBH, JW, COMP.steel.hex, 'steel'), 0, TY, cz);
});

// ── 7. Roof assembly (polyiso + TPO) ──────────────────────────────────────────
// Sits on top of the top rim-beam frame
place(mkBox(BW, RT, BL, COMP.roof.hex, 'roof'), 0, WT_y + TBH + RT/2, 0);

// ── 8. Parapet (4 sides) — sits ON TOP of the roof deck, not inside it ───────
const PY = WT_y + TBH + RT + PH/2;   // parapet centre Y (roof top + half parapet height)
[
  [BW,  PH, WT,   0,         PY, -BL/2+WT/2],
  [BW,  PH, WT,   0,         PY,  BL/2-WT/2],
  [WT,  PH, BL,  -BW/2+WT/2, PY, 0],
  [WT,  PH, BL,   BW/2-WT/2, PY, 0],
].forEach(([w,h,d,x,y,z]) => place(mkBox(w,h,d, COMP.parapet.hex,'parapet'), x,y,z));

// ── 9. Insulated perimeter skirting ──────────────────────────────────────────
[
  [0.2,  FH, BL,   -BW/2,      FH/2, 0],
  [0.2,  FH, BL,    BW/2,      FH/2, 0],
  [BW,   FH, 0.2,   0,         FH/2, -BL/2],
  [BW,   FH, 0.2,   0,         FH/2,  BL/2],
].forEach(([w,h,d,x,y,z]) => place(mkBox(w,h,d, COMP.skirt.hex,'skirt'), x,y,z));
// Skirt access panel indicators — thin plaques sitting just PROUD of the skirt face
[-4, 4].forEach(xo => {
  const apGeo = new THREE.BoxGeometry(0.05, FH*0.7, 1.5);
  const ap = new THREE.Mesh(
    apGeo,
    new THREE.MeshStandardMaterial({ color:0xa59582, roughness:0.95, metalness:0 })
  );
  ap.castShadow = ap.receiveShadow = true;
  ap.userData.key='skirt'; selectables.push(ap);
  addEdges(ap, apGeo);
  place(ap, -BW/2 - 0.135, FH*0.35, xo);  // 0.035 ft clear of the skirt outer face
});

// ── 9b. Ground rim board / belt trim ─────────────────────────────────────────
// Continuous siding-matched belt wrapping the floor-frame zone (between
// skirting top and SIP wall base). Without this, joists + chassis are visibly
// exposed as a horizontal stripe. Upper-floor belt is placed later (see § 18)
// where SHIFT_Y / placeUpper are defined.
const RIMT    = 0.22;                       // rim thickness — sits just proud of SIP face (WT=0.5)
const RIM_G_H = FL - FH;                    // 1.5 ft ground belt height
const RIM_G_Y = (FH + FL) / 2;              // 2.75 ft centre
[
  [RIMT, RIM_G_H, BL,   -BW/2,       RIM_G_Y, 0],
  [RIMT, RIM_G_H, BL,    BW/2,       RIM_G_Y, 0],
  [BW,   RIM_G_H, RIMT,  0,          RIM_G_Y, -BL/2],
  [BW,   RIM_G_H, RIMT,  0,          RIM_G_Y,  BL/2],
].forEach(([w,h,d,x,y,z]) => place(mkBox(w,h,d, COMP.rim.hex,'rim'), x,y,z));

// ── 10. Mini-split outdoor compressor ────────────────────────────────────────
const CX = -BW/2-2.2, CY = FH+1.25, CZ = -BL/2+5.5;
place(mkBox(3, 2.5, 1.5, COMP.compressor.hex, 'compressor'), CX, CY, CZ);
// Grille fins
for (let i=-1;i<=1;i++){
  const gGeo = new THREE.BoxGeometry(0.05,2.1,1.4);
  const g = new THREE.Mesh(gGeo, new THREE.MeshStandardMaterial({color:0xc2c6c9, roughness:0.85, metalness:0.1}));
  g.castShadow = g.receiveShadow = true;
  g.userData.key = 'compressor';
  place(g, CX+i*0.9, CY, CZ-0.77);
}
// Fan disc on south face
const fanDisc = new THREE.Mesh(new THREE.CircleGeometry(0.7,32), new THREE.MeshStandardMaterial({color:0xc8ccd0, roughness:0.7, metalness:0.15, side:THREE.DoubleSide}));
fanDisc.userData.key = 'compressor';
fanDisc.rotation.y = Math.PI/2;
place(fanDisc, CX-1.55, CY+0.4, CZ);
// Line set conduit going up wall
const lineSet = mkCyl(0.06,0.06,2.5, 0xaaaaaa, 'compressor');
place(lineSet, CX+1.4, FL+WH/2-0.2, CZ);

// ── 11. Electrical panel (100 A) ─────────────────────────────────────────────
place(mkBox(0.22, 1.9, 1.3, COMP.panel.hex, 'panel'), BW/2+0.11, FL+3.2, -BL/2+5.5);
// Panel face detail
const panFaceGeo = new THREE.BoxGeometry(0.05,1.8,1.2);
const panFace = new THREE.Mesh(panFaceGeo, new THREE.MeshStandardMaterial({color:0x596068, roughness:0.8, metalness:0.1}));
panFace.castShadow = panFace.receiveShadow = true;
panFace.userData.key = 'panel';
addEdges(panFace, panFaceGeo);
place(panFace, BW/2+0.14, FL+3.2, -BL/2+5.5);

// ── 12. HRV unit (on roof inside parapet) ────────────────────────────────────
place(mkBox(2.5,1.2,1.5, COMP.hrv.hex, 'hrv'), 2.2, WT_y+TBH+RT+0.6, -BL/2+3.2);
// HRV exhaust/intake stubs on parapet face
[-0.5,0.5].forEach(xo => {
  const stub = mkCyl(0.14,0.14,0.6, 0x78909c, 'hrv');
  stub.rotation.x = Math.PI/2;
  place(stub, 2.2+xo, PY, -BL/2+WT/2-0.3);

// ── 13. Well connection (north-east corner of module) ────────────────────────
const WEX=-BW/2-0.35, WEY=FH*0.55, WEZ=BL/2-4.5;
place(mkBox(0.65,0.9,0.65, COMP.well.hex, 'well'), WEX, WEY, WEZ);
place(mkCyl(0.07,0.07,2.0, 0x0277bd,'well'), WEX, 1.0, WEZ);
// Well casing above grade
place(mkCyl(0.2,0.2,1.0, 0x1565c0,'well',10), WEX-2.5, 0.5, WEZ+1.5);

// ── 14. Septic drain stub ─────────────────────────────────────────────────────
place(mkCyl(0.12,0.12,FH*0.85, COMP.septic.hex,'septic'), 2.5, FH*0.43, BL/2-7.5);
place(mkCyl(0.22,0.22,0.18, 0x795548,'septic',10), 2.5, 0.09, BL/2-7.5);
// Drain running underground toward septic
const drain = mkCyl(0.08,0.08,8, 0x8d6e63,'septic');
drain.rotation.x = Math.PI/2;
place(drain, 2.5, -0.1, BL/2-7.5+4);

// ── Roof interior details (visible from above) ────────────────────────────────
// Drain bowl
const drainBGeo = new THREE.CylinderGeometry(0.4,0.15,0.15,24);
const drainB = new THREE.Mesh(drainBGeo, new THREE.MeshStandardMaterial({color:0x363c42, roughness:0.85, metalness:0.05}));
drainB.castShadow = drainB.receiveShadow = true;
drainB.userData.key = 'roof';
addEdges(drainB, drainBGeo);
place(drainB, -3, WT_y+TBH+RT+0.08, 8);

// ═══════════════════════════════════════════════════════════════════════════════
//  15. INTERIOR PARTITIONS (walls between rooms)
//  Floor plan — west (z=-20.5) to east (z=+20.5):
//     ┌──────────────────────────────────────────────────────┐
//     │  LIVING / KITCHEN     │HALL │                        │
//     │  (open plan)          ├─────┤    BEDROOM             │
//     │                       │BATH │                        │
//     └──────────────────────────────────────────────────────┘
//         west             z=-3    +3                 east
// ═══════════════════════════════════════════════════════════════════════════════
const IWT  = 0.3;                 // interior wall thickness
const IWY  = FL + WH/2;           // wall centre Y
const IDH  = 6.8;                 // interior door opening height
const IDHH = WH - IDH;            // header height above door
const IDHY = FL + IDH + IDHH/2;   // header centre Y

// ── Wall at Z=+3 (between bedroom and mid-section) ───────────────────────────
// Bedroom door opening: X = -3 to -0.5 (2.5 ft wide, west side)

// ═══════════════════════════════════════════════════════════════════════════════
//  18. UPPER STORY + STAIRS — visible only in Stacked (2-story) mode
//
//   Structural stack (bottom → top in stacked mode):
//     ─ Piers (3×3 grid, 15 kip helical) → 0 to 2.0
//     ─ Ground chassis + columns                2.0 → 12.5
//     ─ Ground top rim (bears upper chassis)    12.5 → 13.0
//     ─ Upper chassis + joists + subfloor       13.0 → 14.5
//     ─ Upper SIP walls + columns               14.5 → 23.5
//     ─ Upper top rim + roof + parapet          23.5 → 25.85
//
//   Field joists that would cross the stair opening are skipped; upper subfloor
//   is built from 4 pieces around the opening (trimmer joists line the edges).
// ═══════════════════════════════════════════════════════════════════════════════
const SHIFT_Y = (FL - FH) + WH + TBH;      // ≈ 11 ft floor-to-floor

// Stair opening defined FIRST (used by clone filter + subfloor cutout)
const STAIR_X       = -1;
const STAIR_W       = 3;
const STAIR_COUNT   = 14;
const STAIR_TREAD   = 0.85;
const STAIR_TREAD_T = 0.15;
const STAIR_RISE    = SHIFT_Y / STAIR_COUNT;
const STAIR_START_Z = 5;
const STAIR_END_Z   = STAIR_START_Z + STAIR_COUNT * STAIR_TREAD;  // 16.9
const HOLE_X_MIN    = STAIR_X - STAIR_W/2;    // -2.5
const HOLE_X_MAX    = STAIR_X + STAIR_W/2;    // +0.5

// Tag ground ROOF assembly + HRV as single-story only
scene.traverse(obj => {
  if (!obj.isMesh || obj.userData.story) return;
  const k = obj.userData.key;
  if (k === 'roof' || k === 'parapet' || k === 'hrv') obj.userData.story = 'single';
});

// Tag ground BEDROOM furnishings (bed + nightstands) as single-story only —
// in stacked mode bedrooms move upstairs, so the ground bed disappears.
scene.traverse(obj => {
  if (!obj.isMesh || obj.userData.key !== 'furnishings' || obj.userData.story) return;
  const p = obj.position;
  // bed area: X within ±3.5, Z in [9, 17], Y below FL+3 (i.e. ground-floor)
  if (p.y < FL + 3 && Math.abs(p.x) <= 3.5 && p.z > 8 && p.z < 17) {
    obj.userData.story = 'single';
    obj.traverse(c => { if (c !== obj) c.userData.story = 'single'; });
  }
});

// Tag ground-floor Z=+3 partition wall → single-story only. In stacked mode
// this partition is REMOVED so the stair is open to the main living area (no
// walls flanking the stair on the ground floor).
scene.traverse(obj => {
  if (!obj.isMesh || obj.userData.key !== 'interior' || obj.userData.story) return;
  const p = obj.position;
  if (Math.abs(p.z - 3) < 0.2 && p.y < FL + WH + 1) {
    obj.userData.story = 'single';
    obj.traverse(c => { if (c !== obj) c.userData.story = 'single'; });
  }
});

// ── Clone ground → upper (structure, envelope, interior walls) ───────────────
// Skip 'floor' (custom built with stair hole below) and any field joist that
// crosses the stair opening.
const cloneKeysUpper = ['steel','joists','sip','window','roof','parapet','hrv','interior'];
const groundForClone = [];
scene.traverse(obj => {
  if (obj.isMesh && obj.userData.key && cloneKeysUpper.includes(obj.userData.key)) {
    groundForClone.push(obj);
  }
});
groundForClone.forEach(orig => {
  if (orig.userData.key === 'joists') {
    const z = orig.position.z;
    if (z > STAIR_START_Z && z < STAIR_END_Z) return;   // cleared for stair hole
  }
  const clone = orig.clone(true);
  clone.position.y = orig.position.y + SHIFT_Y;
  clone.userData.story = 'upper';
  clone.traverse(c => { if (c !== clone) c.userData.story = 'upper'; });
  scene.add(clone);
  selectables.push(clone);
});

// ── Upper subfloor — 4 pieces leaving a stair opening ────────────────────────
function placeUpper(mesh, x, y, z, story) {
  mesh.userData.story = story;
  mesh.traverse(c => { if (c !== mesh) c.userData.story = story; });
  place(mesh, x, y, z);
  return mesh;
}
const upFY = FL + SHIFT_Y - FD/2;           // centre Y of upper subfloor
const pieces = [
  { w: BW, d: STAIR_START_Z + BL/2, x: 0,                         z: (-BL/2 + STAIR_START_Z)/2 },
  { w: BW, d: BL/2 - STAIR_END_Z,   x: 0,                         z: (STAIR_END_Z + BL/2)/2 },
  { w: HOLE_X_MIN + BW/2, d: STAIR_END_Z - STAIR_START_Z,
    x: (-BW/2 + HOLE_X_MIN)/2,      z: (STAIR_START_Z + STAIR_END_Z)/2 },
  { w: BW/2 - HOLE_X_MAX, d: STAIR_END_Z - STAIR_START_Z,
    x: (HOLE_X_MAX + BW/2)/2,       z: (STAIR_START_Z + STAIR_END_Z)/2 }
];

placeUpper(mkBox(0.08, 0.08, STAIR_COUNT*STAIR_TREAD, 0x3d464d, 'stair'),
           STAIR_X + STAIR_W/2 + 0.2, FL + SHIFT_Y/2 + 2.9, stairCZ, 'stair');

placeUpper(mkBox(4,    2.6,  1,    0xfafafa, 'furnishings'), 3.5,  upFL + 1.3,   2.5,  'upper'); // vanity

// ── Stair-opening framing: doubled trimmers + headers (upper level) ──────────
// Field joists i=15 (z≈4.06) and i=23 (z≈17.07) act as trimmers — doubled with
// sisters. Headers at X=±stair-opening edges run between the trimmers.
const trimSouthZ = -20.32 + 15 * 1.6256;   // 4.06
const trimNorthZ = -20.32 + 23 * 1.6256;   // 17.07
const headerLen  = trimNorthZ - trimSouthZ;

// ── Upper rim board / belt trim — stacked mode only ─────────────────────────
// Wraps the 2 ft band between ground top-rim steel (WT_y=12.5) and upper
// subfloor top (FL + SHIFT_Y = 14.5). Covers ground top rim + upper chassis
// + upper joists + upper subfloor — all of which were visible as a bare
// horizontal stripe before this trim. Tagged story='upper' so it only shows
// in 2-story configuration.
const RIM_U_H = (FL + SHIFT_Y) - WT_y;      // 2.0 ft upper belt height
const RIM_U_Y = (WT_y + FL + SHIFT_Y) / 2;  // 13.5 ft centre
[
  [RIMT, RIM_U_H, BL,   -BW/2,       RIM_U_Y, 0],
  [RIMT, RIM_U_H, BL,    BW/2,       RIM_U_Y, 0],
  [BW,   RIM_U_H, RIMT,  0,          RIM_U_Y, -BL/2],
  [BW,   RIM_U_H, RIMT,  0,          RIM_U_Y,  BL/2],
].forEach(([w,h,d,x,y,z]) => placeUpper(mkBox(w,h,d, COMP.rim.hex,'rim'), x,y,z, 'upper'));

// ═══════════════════════════════════════════════════════════════════════════════
//  19. DUPLEX — SECONDARY UNIT (side-by-side, +BW in X)
//      Combined dwelling: share kitchen, bath, MEP, and remove the seam walls
//      so the two modules read as ONE open-plan home with extra bedrooms —
//      NOT two identical stand-alone units with redundant services.
// ═══════════════════════════════════════════════════════════════════════════════
const DUPLEX_SKIP_KEYS = ['compressor','panel','well','septic','hrv','supply','waste','wiring','ducts'];

function shouldSkipClone(orig) {
  const k = orig.userData.key;
  const p = orig.position;
  // MEP systems: 1 per combined dwelling (no redundant mechanical)
  if (DUPLEX_SKIP_KEYS.includes(k)) return true;
  // Kitchen furnishings (primary kitchen ≈ X 3–5.5, Z < -5 — east wall of primary)
  if (k === 'furnishings' && p.x > 3 && p.x < 5.5 && p.z < -5) return true;
  // Bathroom fixtures (primary bath ≈ X 2–5.6, Z -3.5 to +3.5)
  if (k === 'furnishings' && p.x > 2 && p.x < 5.6 && p.z > -3.5 && p.z < 3.5) return true;
  return false;
}

const primaryForDuplex = [];
scene.traverse(obj => {
  if (obj.isMesh && obj.userData.key) primaryForDuplex.push(obj);
});
primaryForDuplex.forEach(orig => {
  if (shouldSkipClone(orig)) return;
  const clone = orig.clone(true);
  clone.position.x = orig.position.x + BW;
  clone.userData.unit = 'secondary';
  clone.traverse(c => { if (c !== clone) c.userData.unit = 'secondary'; });
  scene.add(clone);
  selectables.push(clone);
});

// ── Tag unit-seam walls + seam windows + middle parapet → hide in duplex ─────
// At the boundary between the two modules (X ≈ +6) you have primary's long-axis
// exterior wall + secondary's matching long-axis wall back-to-back, plus the
// two parapets that ride on top of those walls. In combined-dwelling mode all
// of them disappear so the roof reads as one continuous deck with a single
// perimeter parapet around the joined footprint.
scene.traverse(obj => {
  if (!obj.isMesh) return;
  const k = obj.userData.key;
  if (k !== 'sip' && k !== 'window' && k !== 'parapet' && k !== 'rim') return;
  const p = obj.position;
  if (p.x > 5 && p.x < 7) {     // seam between primary (X=+5.75) and secondary (X=+6.25)
    // Only tag the *long-axis* parapets / rim boards (those running along the
    // seam, Z-aligned). Short-end pieces sit at x=0 and must not be tagged.
    if (k === 'parapet' || k === 'rim') {
      // Long-axis pieces have depth ≫ width (geometry is (WT, *, BL)).
      // Identify them by bounding-box: X-extent ≈ WT, Z-extent ≈ BL.
      const g = obj.geometry;
      if (g && g.parameters) {
        const { width, depth } = g.parameters;   // BoxGeometry params
        if (!(width < 1 && depth > 10)) return;  // skip short-end pieces
      }
    }
    obj.userData.seam = true;
    obj.traverse(c => { if (c !== obj) c.userData.seam = true; });
  }
});

// ═══════════════════════════════════════════════════════════════════════════════
//  VISIBILITY / LAYER SYSTEM
// ═══════════════════════════════════════════════════════════════════════════════
const visibility = {};
Object.keys(COMP).forEach(k => visibility[k] = true);

// Configuration: stacked (vertical) × duplex (horizontal side-by-side)
let isStacked = false;
let isDuplex  = false;

function meshStoryMatches(obj) {
  const s = obj.userData && obj.userData.story;
  if (!s) return true;                                   // common — both modes
  if (isStacked) return s === 'upper' || s === 'stair';   // stacked: upper + stairs
  return s === 'single';                                 // single-story roof/parapet/etc.
}
function meshUnitMatches(obj) {
  const u    = obj.userData && obj.userData.unit;
  const seam = obj.userData && obj.userData.seam;
  // Seam walls between the two modules hide in duplex (open combined plan)
  if (seam && isDuplex) return false;
  if (!u || u === 'primary') return true;                // primary unit always visible
  if (u === 'secondary') return isDuplex;                // secondary only in duplex
  return true;
}

function setVisibility(key, visible) {
  visibility[key] = visible;
  scene.traverse(obj => {
    if (obj.userData && obj.userData.key === key) {
      obj.visible = visible && meshStoryMatches(obj) && meshUnitMatches(obj) && meshBlueprintFloorMatches(obj);
    }
  });
  const row = document.querySelector(`.li[data-k="${key}"]`);
  if (row) row.classList.toggle('li-hidden', !visible);
}

function updateTitlebar() {
  const tbSub = document.querySelector('#titlebar p');
  if (!tbSub) return;
  const width = isDuplex ? "24′" : "12′";
  const baseSF = isStacked ? 1000 : 504;
  const sf = isDuplex ? baseSF * 2 : baseSF;
  let cfg, program;
  if (!isStacked && !isDuplex)     { cfg="Single";    program="1 Bed · 1 Kitchen · 1 Bath"; }
  else if ( isStacked && !isDuplex){ cfg="Stacked";   program="2 Beds Upstairs · 1 Kitchen · 2 Baths (½ down, full up)"; }
  else if (!isStacked &&  isDuplex){ cfg="Bungalow";  program="2 Beds · 1 Kitchen · 1 Bath · Open plan 1,008 SF"; }
  else                             { cfg="Duplex";    program="4 Beds · 1 Kitchen · 2 Baths · Open plan 2,016 SF"; }
  tbSub.textContent = `42′ × ${width} · ${cfg} · ≈${sf.toLocaleString()} SF · ${program}`;
}

// Unified configuration — 4 combinations (single / stacked / bungalow / duplex)
function setConfiguration(stacked, duplex) {
  isStacked = stacked;
  isDuplex  = duplex;
  Object.keys(visibility).forEach(k => setVisibility(k, visibility[k]));
  document.body.classList.toggle('stacked', stacked);
  document.body.classList.toggle('duplex', duplex);
  // Re-centre cameras on the combined footprint
  orbit.target.set(duplex ? BW/2 : 0, 5, 0);
  orthoCam.position.x = duplex ? BW/2 : 0;
  orthoCam.lookAt(duplex ? BW/2 : 0, 0, 0);
  // Configuration dropdown — sync selected option to the active config
  const cfgSel = document.getElementById('cfg-select');
  if (cfgSel) {
    cfgSel.value = (!stacked && !duplex) ? 'single'
                 : ( stacked && !duplex) ? 'stacked'
                 : (!stacked &&  duplex) ? 'bungalow'
                 :                         'duplex';
  }
  updateTitlebar();
  // If blueprint is active, rebuild the per-story sheet list
  if (blueprintMode) {
    blueprintPages = buildBlueprintPages();
    buildBlueprintSheetList();
    applyBlueprintPage(0);     // reset to first sheet (safe index for new list)
  }
}
// Back-compat shims (older callsites, titlebar-only toggles)
function setStackedMode(s) { setConfiguration(s, isDuplex); }
function setDuplexMode(d)  { setConfiguration(isStacked, d); }
function toggleStacked()   { setConfiguration(!isStacked, isDuplex); }
function toggleDuplex()    { setConfiguration(isStacked, !isDuplex); }
// Config dropdown handler — maps option value → (stacked, duplex) flags
function cfgSelectChange(v) {
  const stacked = (v === 'stacked' || v === 'duplex');
  const duplex  = (v === 'bungalow' || v === 'duplex');
  setConfiguration(stacked, duplex);
}

function setAll(visible) {
  Object.keys(COMP).forEach(k => setVisibility(k, visible));
}

function isolate(key) {
  Object.keys(COMP).forEach(k => setVisibility(k, k === key));

let bpvZoom = 1.0;
const BPV_ZOOM_MIN = 0.4, BPV_ZOOM_MAX = 2.5, BPV_ZOOM_STEP = 0.15;

function buildBlueprintsViewer() {
  if (document.getElementById('bp-viewer')) return;
  const root = document.createElement('div');
  root.id = 'bp-viewer';
  root.setAttribute('role', 'dialog');
  root.setAttribute('aria-modal', 'true');
  root.setAttribute('aria-labelledby', 'bpv-current-title');

  // Group rail items by discipline
  const byDisc = {};
  BP_SHEETS.forEach((s, i) => { (byDisc[s.disc] = byDisc[s.disc] || []).push({ ...s, idx:i }); });
  const railHTML = Object.keys(byDisc).map(d => {
    const items = byDisc[d].map(s =>
      `<div class="bpv-item" data-bpv-idx="${s.idx}" onclick="bpvSelect(${s.idx})" title="${s.n} — ${s.title}">` +
        `<span class="bpv-item-num">${s.n}</span>` +
        `<span class="bpv-item-title">${s.title}</span>` +
      `</div>`
    ).join('');
    return `<div class="bpv-cat">${d}</div>${items}`;
  }).join('');

  root.innerHTML =
    '<div class="bpv-header">' +
      '<div class="bpv-title">' +
        '<span class="bpv-tag">AXIS MODULAR</span>' +
        '<span class="bpv-sub">IFC <b>Blueprints</b> — Issued for Construction</span>' +
      '</div>' +
      '<button class="bpv-close" onclick="closeBlueprintsViewer()" aria-label="Close" title="Close (Esc)">×</button>' +
    '</div>' +
    '<div class="bpv-toolbar">' +
      '<button class="bpv-tbtn" onclick="bpvPrev()" title="Previous sheet (←)">◄  Prev</button>' +
      '<button class="bpv-tbtn" onclick="bpvNext()" title="Next sheet (→)">Next  ►</button>' +
      '<span class="bpv-div"></span>' +
      '<div class="bpv-zoom" title="Zoom">' +
        '<button class="bpv-tbtn" onclick="bpvZoomOut()" aria-label="Zoom out">−</button>' +
        '<span class="bpv-zoom-level" id="bpv-zoom-level">100%</span>' +
        '<button class="bpv-tbtn" onclick="bpvZoomIn()" aria-label="Zoom in">+</button>' +
      '</div>' +
      '<button class="bpv-tbtn" onclick="bpvFit()" title="Fit to window (0)">Fit</button>' +
      '<button class="bpv-tbtn" onclick="bpvReset()" title="Reset to 100% (1)">100%</button>' +
      '<span class="bpv-div"></span>' +
      '<button class="bpv-tbtn bpv-tbtn-primary" onclick="bpvDownload()" title="Download this sheet (D)">⭳  Download</button>' +
      '<button class="bpv-tbtn" onclick="bpvCopyLink()" title="Copy link to this sheet (C)">🔗  Copy link</button>' +
      '<button class="bpv-tbtn" onclick="bpvOpenWindow()" title="Open this sheet in a new window">↗  New window</button>' +
      '<span class="bpv-spacer"></span>' +
      '<span class="bpv-current-sheet">Sheet <b id="bpv-current-num">—</b>  ·  <span id="bpv-current-title">—</span></span>' +
    '</div>' +
    '<div class="bpv-body">' +
      '<div class="bpv-rail" id="bpv-rail">' + railHTML + '</div>' +
      '<div class="bpv-stage" id="bpv-stage">' +
        '<div class="bpv-sheet-wrap" id="bpv-sheet-wrap">' +
          '<iframe id="bpv-frame" title="Blueprint sheet"></iframe>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="bpv-toast" id="bpv-toast">Copied!</div>';

  document.body.appendChild(root);

  // Keyboard shortcuts — only active when modal is shown
  document.addEventListener('keydown', e => {
    if (!root.classList.contains('show')) return;
    if (e.key === 'Escape')          { closeBlueprintsViewer(); e.preventDefault(); }
    else if (e.key === 'ArrowLeft')  { bpvPrev();  e.preventDefault(); }
    else if (e.key === 'ArrowRight') { bpvNext();  e.preventDefault(); }
    else if (e.key === '+' || e.key === '=') { bpvZoomIn();  e.preventDefault(); }
    else if (e.key === '-' || e.key === '_') { bpvZoomOut(); e.preventDefault(); }
    else if (e.key === '0')          { bpvFit();   e.preventDefault(); }
    else if (e.key === '1')          { bpvReset(); e.preventDefault(); }
    else if (e.key === 'd' || e.key === 'D') { bpvDownload();  e.preventDefault(); }
    else if (e.key === 'c' || e.key === 'C') { bpvCopyLink();  e.preventDefault(); }
  });

  // Ctrl/Cmd + wheel → zoom
  const stage = root.querySelector('#bpv-stage');
  stage.addEventListener('wheel', e => {
    if (!(e.ctrlKey || e.metaKey)) return;
    e.preventDefault();
    if (e.deltaY < 0) bpvZoomIn(); else bpvZoomOut();
  }, { passive:false });
}

function openBlueprintsViewer(startKey) {
  buildBlueprintsViewer();
  // Pick a starting sheet — if the caller passes a component key, jump to it
  let startIdx = 0;
  if (startKey) {
    const i = BP_SHEETS.findIndex(s => s.k === startKey);
    if (i >= 0) startIdx = i;
  }
  document.getElementById('bp-viewer').classList.add('show');
  bpvSelect(startIdx);
  bpvFit();
}

function closeBlueprintsViewer() {
  const v = document.getElementById('bp-viewer');
  if (v) v.classList.remove('show');
}

function bpvSelect(idx) {
  if (idx < 0 || idx >= BP_SHEETS.length) return;
  bpvIdx = idx;
  const s = BP_SHEETS[idx];
  const frame = document.getElementById('bpv-frame');
  // Prefer the embedded blueprint HTML (works on file://, computer://, any server)
  const embedEl = document.querySelector('script[type="text/html"][data-bp="' + s.file + '"]');
  if (frame) {
    if (embedEl) {
      // Use srcdoc — the iframe renders the raw HTML directly, no network fetch
      frame.removeAttribute('src');
      frame.setAttribute('srcdoc', embedEl.textContent);
    } else {
      // Fallback — relative path
      frame.removeAttribute('srcdoc');
      frame.setAttribute('src', s.file);
    }
  }
  // Update current sheet indicator
  document.getElementById('bpv-current-num').textContent   = s.n;
  document.getElementById('bpv-current-title').textContent = s.title;
  // Update rail highlight
  document.querySelectorAll('#bpv-rail .bpv-item').forEach(el => {
    el.classList.toggle('active', Number(el.dataset.bpvIdx) === idx);
  });
  // Scroll active item into view in the rail
  const active = document.querySelector('#bpv-rail .bpv-item.active');
  if (active) active.scrollIntoView({ block:'nearest' });
}

function bpvPrev() { bpvSelect((bpvIdx - 1 + BP_SHEETS.length) % BP_SHEETS.length); }
function bpvNext() { bpvSelect((bpvIdx + 1) % BP_SHEETS.length); }

function bpvApplyZoom() {
  const wrap = document.getElementById('bpv-sheet-wrap');
  if (!wrap) return;
  wrap.style.transform = 'scale(' + bpvZoom + ')';
  // Reserve scroll space so a scaled-up sheet can actually scroll
  wrap.style.marginBottom = (wrap.offsetHeight * (bpvZoom - 1)) + 'px';
  document.getElementById('bpv-zoom-level').textContent = Math.round(bpvZoom * 100) + '%';
}
function bpvZoomIn()  { bpvZoom = Math.min(BPV_ZOOM_MAX, +(bpvZoom + BPV_ZOOM_STEP).toFixed(2)); bpvApplyZoom(); }
function bpvZoomOut() { bpvZoom = Math.max(BPV_ZOOM_MIN, +(bpvZoom - BPV_ZOOM_STEP).toFixed(2)); bpvApplyZoom(); }
function bpvReset()   { bpvZoom = 1.0; bpvApplyZoom(); }
function bpvFit() {
  // Fit the sheet-wrap (1100×800) into the current stage size
  const stage = document.getElementById('bpv-stage');
  const wrap  = document.getElementById('bpv-sheet-wrap');
  if (!stage || !wrap) return;
  const padding = 48;
  const availW = stage.clientWidth  - padding;
  const availH = stage.clientHeight - padding;
  const baseW = wrap.offsetWidth || 1100;
  const baseH = wrap.offsetHeight || 800;
  const s = Math.min(availW / baseW, availH / baseH, 1.2);
  bpvZoom = Math.max(BPV_ZOOM_MIN, +s.toFixed(2));
  bpvApplyZoom();
}

function bpvDownload() {
  const s = BP_SHEETS[bpvIdx];
  const embedEl = document.querySelector('script[type="text/html"][data-bp="' + s.file + '"]');
  const filename = s.n + ' - ' + s.title.replace(/[^A-Za-z0-9 \-]/g, '') + '.html';
  let href = s.file;
  let revoke = null;
  if (embedEl) {
    // Build a Blob URL from the embedded content — works under any protocol
    const blob = new Blob([embedEl.textContent], { type:'text/html;charset=utf-8' });
    href = URL.createObjectURL(blob);
    revoke = () => URL.revokeObjectURL(href);
  }
  const a = document.createElement('a');
  a.href = href; a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  if (revoke) setTimeout(revoke, 2000);
  bpvToast('Downloading ' + s.n + '…');
}

function bpvOpenWindow() {
  const s = BP_SHEETS[bpvIdx];
  const embedEl = document.querySelector('script[type="text/html"][data-bp="' + s.file + '"]');
  let href = s.file;
  if (embedEl) {
    const blob = new Blob([embedEl.textContent], { type:'text/html;charset=utf-8' });
    href = URL.createObjectURL(blob);
  }
  window.open(href, 'bp_' + s.n, 'width=1240,height=900,noopener,noreferrer');
}

function bpvCopyLink() {
  const s = BP_SHEETS[bpvIdx];
  // Build an absolute URL resolvable in the user's current context
  const abs = new URL(s.file, window.location.href).href;
  const copy = txt => {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(txt);
    }
    // Fallback for file:// where clipboard API may be unavailable
    const ta = document.createElement('textarea');
    ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(_){}
    ta.remove();
    return Promise.resolve();
  };
  copy(abs).then(
    () => bpvToast('Link copied — ' + s.n),
    () => bpvToast('Copy failed — ' + abs)
  );
}

function bpvToast(msg) {
  const t = document.getElementById('bpv-toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(bpvToast._t);
  bpvToast._t = setTimeout(() => t.classList.remove('show'), 1600);
}

// Re-fit when the window resizes while the viewer is open
window.addEventListener('resize', () => {
  const v = document.getElementById('bp-viewer');
  if (v && v.classList.contains('show')) bpvFit();
});

// ground-floor and upper-floor framing don't overlap in the top-down projection.

function meshBlueprintFloorMatches(obj) {
  if (!blueprintFloorFilter) return true;
  const s = obj.userData && obj.userData.story;
  if (blueprintFloorFilter === 'ground') return !s || s === 'single';
  if (blueprintFloorFilter === 'upper')  return s === 'upper' || s === 'stair';
  return true;
}
